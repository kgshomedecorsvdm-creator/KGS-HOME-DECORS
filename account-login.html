<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | KGS Home Décors</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
  <link rel="stylesheet" href="assets/css/icons.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .auth-input { padding: 14px 16px; border: 1px solid rgba(197,168,128,0.40); border-radius: 8px; font-family: 'Jost', sans-serif; font-size: 14px; background: #fff; width: 100%; box-sizing: border-box; transition: border-color 200ms, box-shadow 200ms; }
    .auth-input:focus { outline: none; border-color: #B89657; box-shadow: 0 0 0 3px rgba(184,150,87,0.12); }
    .auth-input.error { border-color: #D32F2F; box-shadow: 0 0 0 3px rgba(211,47,47,0.08); }
    .auth-label { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; text-align: left; }
    .auth-label > span { font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: #1A1A1A; }
    .field-wrap { position: relative; }
    .field-wrap .auth-input { padding-right: 46px; }
    .eye-btn { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9E9B98; padding: 4px; display: flex; align-items: center; transition: color 200ms; }
    .eye-btn:hover { color: #1A1A1A; }
    .eye-btn .material-symbols-outlined { font-size: 18px; }
    .err-msg { display: none; align-items: center; gap: 8px; background: rgba(211,47,47,0.06); border: 1px solid rgba(211,47,47,0.20); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #C62828; margin-bottom: 20px; text-align: left; }
    .err-msg.show { display: flex; }
    .info-msg { display: none; align-items: center; gap: 8px; background: rgba(184,150,87,0.08); border: 1px solid rgba(184,150,87,0.25); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #7A5C1E; margin-bottom: 20px; text-align: left; }
    .info-msg.show { display: flex; }
  </style>
</head>
<body style="background: #FAF8F4; display: flex; flex-direction: column; min-height: 100vh;">

<div class="nav-wrap">
  <div class="nav-bar container">
    <a href="index.html" class="logo">
      <span class="mark">KGS</span>
      <span class="sub">Home Décors</span>
    </a>
    <nav class="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="product-listing.html">Shop</a>
      <a class="nav-link" href="index.html#about">Our Story</a>
      <a class="nav-link" href="index.html#contact">Contact</a>
    </nav>
    <div class="nav-actions">
      <a class="icon-btn" href="account.html" aria-label="Account"><span class="material-symbols-outlined">person</span></a>
      <a class="icon-btn" href="index.html" aria-label="Cart"><span class="material-symbols-outlined">shopping_bag</span></a>
    </div>
  </div>
</div>

<main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px;">
  <div style="width: 100%; max-width: 440px; padding: 48px; background: #fff; border: 1px solid rgba(197,168,128,0.25); border-radius: 16px; text-align: center; box-shadow: 0 12px 48px -12px rgba(0,0,0,0.06);">

    <div style="width: 52px; height: 52px; background: rgba(184,150,87,0.10); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
      <span class="material-symbols-outlined" style="font-size: 24px; color: #B89657;">person</span>
    </div>
    <h1 style="font-family:'Crimson Pro',serif; font-size: 30px; font-weight: 500; margin-bottom: 6px; letter-spacing: -0.01em;">Welcome Back</h1>
    <p style="font-size: 13.5px; color: #5E5B59; margin-bottom: 32px; line-height: 1.6;">Sign in to your KGS account to track orders and manage your wishlist.</p>

    <div class="info-msg" id="info-msg">
      <span class="material-symbols-outlined" style="font-size:17px; flex-shrink:0;">info</span>
      <span id="info-text"></span>
    </div>
    <div class="err-msg" id="err-msg">
      <span class="material-symbols-outlined" style="font-size:17px; flex-shrink:0;">error</span>
      <span id="err-text"></span>
    </div>

    <form id="login-form" novalidate>
      <label class="auth-label">
        <span>Email Address</span>
        <input type="email" id="email" class="auth-input" placeholder="you@example.com" autocomplete="email" required>
      </label>
      <label class="auth-label">
        <span>Password</span>
        <div class="field-wrap">
          <input type="password" id="password" class="auth-input" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="eye-btn" onclick="toggleEye('password',this)" aria-label="Show password">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </label>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px;">
        <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5E5B59; cursor: pointer;">
          <input type="checkbox" id="remember-me" style="accent-color: #B89657; width: 15px; height: 15px;"> Remember me
        </label>
        <a href="forgot-password.html" style="font-size: 13px; color: #B89657; font-weight: 600;">Forgot password?</a>
      </div>

      <button type="submit" id="submit-btn" class="btn btn-dark" style="width: 100%; margin-bottom: 24px; font-size: 14px; letter-spacing: .03em;">
        Sign In
      </button>

      <div style="font-size: 13.5px; color: #5E5B59;">
        Don't have an account? <a href="account-register.html" style="color: #B89657; font-weight: 600;">Create account</a>
      </div>
    </form>
  </div>
</main>

<script src="assets/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
// ── Eye toggle ──────────────────────────────────────────────────
function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  const hidden = inp.type === 'password';
  inp.type = hidden ? 'text' : 'password';
  btn.querySelector('.material-symbols-outlined').textContent = hidden ? 'visibility_off' : 'visibility';
  btn.setAttribute('aria-label', hidden ? 'Hide password' : 'Show password');
}

// ── Error / info messages ───────────────────────────────────────
function showErr(msg) {
  const box = document.getElementById('err-msg');
  document.getElementById('err-text').textContent = msg;
  box.classList.add('show');
  document.getElementById('info-msg').classList.remove('show');
}
function showInfo(msg) {
  const box = document.getElementById('info-msg');
  document.getElementById('info-text').textContent = msg;
  box.classList.add('show');
  document.getElementById('err-msg').classList.remove('show');
}
function clearMessages() {
  document.getElementById('err-msg').classList.remove('show');
  document.getElementById('info-msg').classList.remove('show');
}

// ── Friendly error messages ─────────────────────────────────────
function friendlyError(err) {
  const msg = (err.message || '').toLowerCase();
  if (msg.includes('invalid login') || msg.includes('invalid credentials') || msg.includes('wrong password')) return 'Incorrect email or password. Please try again.';
  if (msg.includes('email not confirmed')) return 'Please verify your email first. Check your inbox for the confirmation link.';
  if (msg.includes('too many requests') || msg.includes('rate limit')) return 'Too many attempts. Please wait a few minutes and try again.';
  if (msg.includes('network') || msg.includes('fetch')) return 'Connection error. Check your internet and try again.';
  return 'Sign in failed. Please check your details and try again.';
}

// ── Remember-me: sign out on browser close if unchecked ────────
function setupRememberMe(rememberChecked) {
  if (!rememberChecked) {
    window.addEventListener('beforeunload', () => {
      navigator.sendBeacon && getSupabase().auth.signOut();
    });
  }
}

// ── Redirect if already signed in ──────────────────────────────
(async () => {
  try {
    const session = await getSession();
    if (session) window.location.replace('account.html');
  } catch (_) {}
})();

// ── Check for info from other pages (e.g. after reset) ─────────
const params = new URLSearchParams(location.search);
if (params.get('msg') === 'password-updated') showInfo('Password updated successfully. Please sign in with your new password.');
if (params.get('msg') === 'signed-out') showInfo('You have been signed out.');

// ── Form submit ─────────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessages();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember-me').checked;
  const btn = document.getElementById('submit-btn');

  if (!email || !password) { showErr('Please fill in all fields.'); return; }

  btn.textContent = 'Signing in…';
  btn.disabled = true;

  try {
    await signIn(email, password);
    setupRememberMe(remember);
    window.location.replace('account.html');
  } catch (err) {
    showErr(friendlyError(err));
    btn.textContent = 'Sign In';
    btn.disabled = false;
    document.getElementById('password').focus();
  }
});
</script>
</body>
</html>
