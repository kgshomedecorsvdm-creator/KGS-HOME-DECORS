<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KGS Home Décors — Furniture &amp; Home Décor, Virudhachalam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <style>
    /* ============================================================================
   KGS HOME DÉCORS — DESIGN TOKENS
   Premium furniture & home décor brand
   Virudhachalam, Tamil Nadu — kgshomedecors.in
   ============================================================================ */

    /* ---- WEBFONTS (Google Fonts — same as production) -------------------------- */
    :root {

      /* ──────────────────────────────────────────────────────────────────────────
     COLORS — warm-neutral palette inspired by Tamil Nadu interior craft.
     Bone-paper base, soft ink text, antique-gold accent, terracotta CTA.
     ────────────────────────────────────────────────────────────────────────── */

      /* Surfaces */
      --base: #FAF8F4;
      /* page background — soft bone */
      --tint: #F3EDE4;
      /* sections / banners / panels */
      --surface: #FDF9F3;
      /* cards / nav / elevated surfaces */
      --white: #FFFFFF;

      /* Ink / text */
      --ink: #1A1A1A;
      /* primary headings + body */
      --muted: #5E5B59;
      /* secondary copy, captions */
      --soft: #767270;
      /* nav links inactive */
      --label: #7A5C1E;
      /* eyebrow / overline (WCAG-AA on surface) */

      /* Brand accents */
      --gold: #C5A880;
      /* antique-gold — borders, icons, hover */
      --gold-dark: #A8916B;
      /* gold hover state */
      --warm: #C97840;
      /* terracotta — CTAs, badges, price-cut */
      --warm-dark: #A8612D;
      /* terracotta hover */
      --warm-soft: #E8B58A;
      /* warm tint, decorative */

      /* Borders & dividers */
      --border: #E4DDD4;
      --border-soft: rgba(26, 26, 26, 0.06);
      --border-strong: rgba(26, 26, 26, 0.30);

      /* Status / utility (used sparingly) */
      --success: #25D366;
      /* WhatsApp green — also used as success */
      --info: #4285F4;
      /* Google blue (reviews only) */
      --error: #C0392B;

      /* Selection */
      --selection-bg: var(--gold);
      --selection-fg: #fff;


      /* ──────────────────────────────────────────────────────────────────────────
     TYPOGRAPHY — serif display × sans body
     ────────────────────────────────────────────────────────────────────────── */

      /* Families */
      --font-serif: 'Crimson Pro', 'Georgia', serif;
      /* display, headings, quotes */
      --font-sans: 'Jost', 'Helvetica Neue', sans-serif;
      /* body, UI, labels */
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;

      /* Weights */
      --w-light: 300;
      --w-regular: 400;
      --w-medium: 500;
      --w-semi: 600;
      --w-bold: 700;

      /* Type scale (clamp-based, fluid) */
      --t-hero: clamp(3rem, 6vw, 5.5rem);
      /* H1 hero — "Design Your Space" */
      --t-h1: clamp(2.4rem, 5vw, 4.5rem);
      /* page hero */
      --t-h2: clamp(1.9rem, 3.5vw, 3rem);
      /* section titles */
      --t-h3: clamp(1.5rem, 2.5vw, 2rem);
      /* card titles */
      --t-h4: 1.2rem;
      /* value-card titles */
      --t-lead: 1.125rem;
      /* lead paragraph */
      --t-body: 0.9375rem;
      /* default body 15px */
      --t-sm: 0.8125rem;
      /* secondary 13px */
      --t-xs: 0.6875rem;
      /* eyebrow / label 11px */
      --t-2xs: 0.625rem;
      /* nav micro-cap 10px */

      /* Line-height */
      --lh-tight: 1.1;
      --lh-snug: 1.3;
      --lh-normal: 1.6;
      --lh-relaxed: 1.85;
      --lh-loose: 1.9;

      /* Letter-spacing — generous tracking is a KGS signature on uppercase labels */
      --ls-hero: -0.01em;
      --ls-tight: -0.005em;
      --ls-normal: 0;
      --ls-label: 0.14em;
      --ls-eyebrow: 0.22em;
      --ls-logo: 0.35em;
      /* the "KGS" wordmark spacing */


      /* ──────────────────────────────────────────────────────────────────────────
     SPACING — 4px baseline grid
     ────────────────────────────────────────────────────────────────────────── */
      --s-0: 0;
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 20px;
      --s-6: 24px;
      --s-8: 32px;
      --s-10: 40px;
      --s-12: 48px;
      --s-16: 64px;
      --s-20: 80px;
      /* section vertical rhythm */
      --s-24: 96px;
      --s-28: 112px;

      /* Layout */
      --max-w: 1440px;
      /* page max width (90rem) */
      --gutter: 48px;
      /* px-12 on desktop */
      --gutter-sm: 20px;
      /* px-5 on mobile */
      --nav-h: 96px;
      /* h-24 desktop */
      --nav-h-sm: 80px;
      /* h-20 mobile */


      /* ──────────────────────────────────────────────────────────────────────────
     RADII — KGS uses sharp + subtle, never pillowy. Big sculpted corners
     appear ONLY on hero image masks (asymmetric tl/br).
     ────────────────────────────────────────────────────────────────────────── */
      --r-none: 0;
      --r-sm: 4px;
      /* small chips, skeletons */
      --r-md: 6px;
      /* default — cards, inputs */
      --r-lg: 12px;
      --r-pill: 9999px;
      /* CTA buttons in some contexts, badges */
      --r-hero-tl: 200px;
      /* signature asymmetric hero mask top-left */
      --r-hero-br: 40px;
      /* signature asymmetric hero mask bottom-right */


      /* ──────────────────────────────────────────────────────────────────────────
     SHADOWS — premium = restrained. Long, soft, far-offset.
     ────────────────────────────────────────────────────────────────────────── */
      --sh-none: none;
      --sh-xs: 0 4px 12px rgba(0, 0, 0, 0.04);
      --sh-sm: 0 10px 30px -5px rgba(0, 0, 0, 0.03);
      --sh-md: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
      --sh-lg: 0 12px 40px -10px rgba(0, 0, 0, 0.08);
      --sh-hover: 0 20px 40px -10px rgba(26, 26, 26, 0.10);
      --sh-cta: 0 4px 14px rgba(201, 120, 64, 0.15);
      --sh-cta-hov: 0 20px 40px -10px rgba(201, 120, 64, 0.45);
      --sh-wa: 0 4px 20px rgba(37, 211, 102, 0.40);


      /* ──────────────────────────────────────────────────────────────────────────
     MOTION — "premium" easing curves. Quick punch on press, slow on reveal.
     ────────────────────────────────────────────────────────────────────────── */
      --ease-punch: cubic-bezier(0.23, 1, 0.32, 1);
      /* hero, hover */
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
      /* drawers, modals */
      --ease-cta: cubic-bezier(0.25, 1, 0.5, 1);
      /* buttons */
      --ease-img: cubic-bezier(0.33, 1, 0.68, 1);
      /* image zoom */

      --t-fast: 160ms;
      --t-base: 250ms;
      --t-slow: 400ms;
      --t-image: 700ms;
      /* image zoom-in on hover */
    }


    /* ============================================================================
   SEMANTIC TYPE RECIPES — apply to real HTML elements
   ============================================================================ */

    html,
    body {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--ink);
      background: var(--base);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: var(--lh-normal);
    }

    ::selection {
      background: var(--selection-bg);
      color: var(--selection-fg);
    }

    /* Display & headings — Crimson Pro, never bold, medium weight is the KGS look */
    .t-hero,
    h1.t-hero {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-hero);
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-hero);
      color: var(--ink);
    }

    h1,
    .t-h1 {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-h1);
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-tight);
    }

    h2,
    .t-h2 {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-h2);
      line-height: var(--lh-snug);
    }

    h3,
    .t-h3 {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-h3);
      line-height: var(--lh-snug);
    }

    h4,
    .t-h4 {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-h4);
      line-height: var(--lh-snug);
    }

    /* Body */
    p,
    .t-body {
      font-family: var(--font-sans);
      font-size: var(--t-body);
      line-height: var(--lh-relaxed);
      color: var(--muted);
    }

    .t-lead {
      font-family: var(--font-sans);
      font-size: var(--t-lead);
      line-height: var(--lh-loose);
      color: var(--muted);
    }

    .t-small {
      font-size: var(--t-sm);
      line-height: var(--lh-normal);
      color: var(--muted);
    }

    /* Eyebrow / overline — small uppercase, wide tracking. KGS uses this everywhere
   to introduce a section. Gold or label-amber on warm bg. */
    .t-eyebrow {
      font-family: var(--font-sans);
      font-size: var(--t-xs);
      font-weight: var(--w-semi);
      text-transform: uppercase;
      letter-spacing: var(--ls-eyebrow);
      color: var(--label);
    }

    .t-eyebrow--gold {
      color: var(--gold);
    }

    .t-eyebrow--ink {
      color: var(--ink);
    }

    /* Nav link cap */
    .t-nav {
      font-family: var(--font-sans);
      font-size: var(--t-xs);
      font-weight: var(--w-medium);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--soft);
    }

    /* Button label */
    .t-btn {
      font-family: var(--font-sans);
      font-size: var(--t-xs);
      font-weight: var(--w-semi);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
    }

    /* Logo wordmark */
    .t-logo {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      letter-spacing: var(--ls-logo);
      color: var(--ink);
    }

    /* Italic serif — used in testimonials/quotes */
    .t-quote {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: var(--w-regular);
      line-height: var(--lh-relaxed);
      color: var(--ink);
    }

    /* Price (current) */
    .t-price {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: 1.4rem;
      color: var(--ink);
    }

    .t-price--strike {
      font-family: var(--font-sans);
      font-size: var(--t-sm);
      color: var(--muted);
      text-decoration: line-through;
    }

    /* KGS Home Décors — Component Styles 2026 */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      overflow-x: clip;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: #FAF8F4;
      color: #1A1A1A;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 22px;
      line-height: 1;
      display: inline-block;
      white-space: nowrap;
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ===== Buttons — pill, generous ============================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0;
      padding: 14px 26px;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 280ms cubic-bezier(0.25, 1, 0.5, 1);
      border: none;
    }

    .btn-dark {
      background: #1A1A1A;
      color: #fff;
      border: 1px solid #1A1A1A;
    }

    .btn-dark:hover {
      background: #2A2A2A;
      transform: translateY(-2px);
      box-shadow: 0 16px 32px -16px rgba(0, 0, 0, 0.45);
    }

    .btn-ghost {
      background: transparent;
      color: #1A1A1A;
      border: 1px solid rgba(26, 26, 26, 0.18);
    }

    .btn-ghost:hover {
      background: #1A1A1A;
      color: #fff;
      border-color: #1A1A1A;
    }

    .btn-gold {
      background: #B89657;
      color: #fff;
      border: 1px solid #B89657;
    }

    .btn-gold:hover {
      background: #A0824A;
      transform: translateY(-2px);
      box-shadow: 0 16px 32px -16px rgba(184, 150, 87, 0.55);
    }

    .btn-cream {
      background: #fff;
      color: #1A1A1A;
      border: 1px solid rgba(26, 26, 26, 0.10);
    }

    .btn-cream:hover {
      box-shadow: 0 14px 28px -14px rgba(0, 0, 0, 0.18);
      transform: translateY(-2px);
    }

    .btn .material-symbols-outlined {
      font-size: 17px;
    }

    /* Tiny pill chip */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(26, 26, 26, 0.06);
      padding: 7px 14px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      color: #1A1A1A;
    }

    .chip .dot {
      width: 6px;
      height: 6px;
      background: #25D366;
      border-radius: 9999px;
    }

    /* ===== Announce bar ============================================== */
    .announce {
      background: #1A1614;
      color: rgba(255, 255, 255, 0.78);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-family: 'Jost', sans-serif;
      position: relative;
      z-index: 60;
      overflow: hidden;
    }

    /* Subtle shimmer line that sweeps across on each message change */
    @keyframes barShimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .announce::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 25%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(197,168,128,0.07), transparent);
      animation: barShimmer 4s linear infinite;
      pointer-events: none;
    }

    .announce-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 40px;
      font-size: 11.5px;
      gap: 28px;
    }

    .announce-side {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 11px;
      letter-spacing: .04em;
    }

    .announce-side--right {
      justify-self: end;
      gap: 14px;
    }

    .announce-side a {
      color: rgba(255, 255, 255, 0.65);
      transition: color 200ms ease;
      letter-spacing: .03em;
    }

    .announce-side a:hover {
      color: #C5A880;
    }

    .announce-side .material-symbols-outlined {
      color: #C5A880;
      font-size: 14px;
    }

    .announce-divider {
      width: 1px;
      height: 10px;
      background: rgba(255, 255, 255, 0.10);
    }

    /* Progress dots */
    .announce-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-right: 14px;
    }
    .announce-dot {
      width: 4px;
      height: 4px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.18);
      transition: all 400ms ease;
    }
    .announce-dot.active {
      width: 16px;
      background: #C5A880;
    }

    .announce-center {
      position: relative;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 380px;
      text-align: center;
    }

    .announce-msg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: #fff;
      font-size: 11.5px;
      letter-spacing: .03em;
      white-space: nowrap;
      transition: opacity 500ms cubic-bezier(0.23,1,0.32,1), transform 500ms cubic-bezier(0.23,1,0.32,1);
    }

    .announce-msg b {
      color: #C5A880;
      font-weight: 600;
    }

    .announce-msg .material-symbols-outlined {
      color: #C5A880;
      font-size: 15px;
    }

    .announce-msg.in {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    .announce-msg.out-up {
      opacity: 0;
      transform: translate(-50%, calc(-50% - 10px));
      pointer-events: none;
    }

    .announce-msg.out-down {
      opacity: 0;
      transform: translate(-50%, calc(-50% + 10px));
      pointer-events: none;
    }

    /* ===== Premium Dynamic Nav ========================== */
    .nav-wrap {
      position: sticky;
      top: 20px;
      z-index: 50;
      padding: 0 32px;
      transition: transform 500ms cubic-bezier(0.16, 1, 0.3, 1), top 500ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Hidden state — slides up off-screen */
    .nav-wrap.nav--hidden {
      transform: translateY(calc(-100% - 40px));
    }

    /* Scrolled state — pill becomes a sleek, high-end floating bar */
    .nav-wrap.nav--scrolled {
      top: 12px;
    }

    .nav-wrap.nav--scrolled .nav-bar {
      height: 52px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(40px) saturate(200%);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.04);
      border-color: transparent;
      padding: 0 20px;
    }

    .nav-bar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
      height: 68px;
      background: rgba(255, 255, 255, 0.80);
      backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 9999px;
      padding: 0 28px;
      box-shadow: 0 12px 32px -12px rgba(60, 40, 15, 0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      max-width: 1320px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      transition: all 500ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Thin premium gold progress line */
    .nav-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #C5A880, #B89657, transparent);
      border-radius: 0;
      width: 0%;
      transition: width 100ms linear;
      pointer-events: none;
      box-shadow: 0 -1px 4px rgba(184, 150, 87, 0.4);
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      cursor: pointer;
    }

    .logo .mark {
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      font-size: 1.45rem;
      letter-spacing: .03em;
      color: #1A1A1A;
    }

    .logo .sub {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: #B89657;
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
      justify-self: center;
    }

    .nav-link {
      position: relative;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #5E5B59;
      cursor: pointer;
      transition: color 300ms ease;
      padding: 6px 4px;
    }

    .nav-link.active,
    .nav-link:hover {
      color: #1A1A1A;
    }

    /* Animated underline — smooth scale from center */
    .nav-link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      border-radius: 9999px;
      background: #B89657;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 400ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-link.active::after,
    .nav-link:hover::after {
      transform: scaleX(1);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #1A1A1A;
    }

    .icon-btn {
      background: rgba(26, 26, 26, 0.03);
      border: 1px solid transparent;
      width: 40px;
      height: 40px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      cursor: pointer;
      transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .icon-btn:hover {
      background: #1A1A1A;
      color: #fff;
      transform: scale(1.05);
      box-shadow: 0 8px 16px -4px rgba(0,0,0,0.2);
    }
    
    .icon-btn:active {
      transform: scale(0.95);
    }

    .pip {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 18px;
      height: 18px;
      background: #C97840;
      border-radius: 9999px;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 4px 8px rgba(201, 120, 64, 0.3);
      transition: transform 300ms cubic-bezier(0.16,1,0.3,1);
    }
    
    .icon-btn:hover .pip {
      transform: scale(1.1) translateY(-1px);
      border-color: #1A1A1A;
    }

    /* Hamburger — mobile only */
    .hamburger-btn {
      display: none;
      background: rgba(26, 26, 26, 0.04);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 9999px;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .hamburger-btn:hover {
      background: #1A1A1A;
      color: #fff;
    }

    /* Mobile nav drawer */
    .mobile-nav {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 200;
    }

    .mobile-nav.open {
      display: block;
    }

    .mobile-nav-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26, 22, 20, 0.6);
      backdrop-filter: blur(4px);
    }

    .mobile-nav-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 280px;
      background: #fff;
      padding: 24px 28px 40px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: -20px 0 48px rgba(0, 0, 0, 0.2);
      overflow-y: auto;
    }

    .mobile-nav-close {
      align-self: flex-end;
      background: rgba(26, 26, 26, 0.06);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .mobile-nav-link {
      font-family: 'Jost', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #1A1A1A;
      padding: 12px 0;
      border-bottom: 1px solid rgba(197, 168, 128, 0.20);
      cursor: pointer;
      letter-spacing: .02em;
      transition: color 200ms ease;
    }

    .mobile-nav-link:hover,
    .mobile-nav-link.active {
      color: #B89657;
    }

    /* ===== Trust strip ========================================= */
    .trust-strip {
      background: #fff;
      padding: 28px 0;
      margin-top: 12px;
    }

    .trust-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
      align-items: center;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .trust-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(184, 150, 87, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #B89657;
    }

    .trust-icon .material-symbols-outlined {
      font-size: 22px;
      font-variation-settings: 'wght' 300;
    }

    .trust-title {
      font-size: 13px;
      font-weight: 600;
      color: #1A1A1A;
    }

    .trust-sub {
      font-size: 11.5px;
      color: #5E5B59;
      margin-top: 2px;
    }

    /* ===== Label tag ============================================ */
    .label-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 9999px;
      background: rgba(184, 150, 87, 0.12);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #8E7449;
      margin-bottom: 14px;
    }

    /* ===== Section heading ======================================= */
    .section {
      padding: 80px 0;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .section-head h2 {
      font-size: 36px;
      line-height: 1.1;
    }

    .section-head .label-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 9999px;
      background: rgba(184, 150, 87, 0.12);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #8E7449;
      margin-bottom: 14px;
    }

    .section-head .view-all {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #1A1A1A;
      padding: 10px 18px;
      border-radius: 9999px;
      background: #fff;
      border: 1px solid rgba(26, 26, 26, 0.06);
      transition: all 220ms ease;
    }

    .section-head .view-all:hover {
      background: #1A1A1A;
      color: #fff;
      border-color: #1A1A1A;
    }

    .section-head .view-all .material-symbols-outlined {
      font-size: 15px;
    }

    /* ===== Category card ======================================== */
    .cat-card {
      cursor: pointer;
    }

    .cat-frame {
      aspect-ratio: 1;
      background: #ECE0C7;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      transition: transform 320ms cubic-bezier(0.23, 1, 0.32, 1), box-shadow 320ms ease;
    }

    .cat-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.92) brightness(1.02);
      transition: transform 700ms cubic-bezier(0.33, 1, 0.68, 1);
    }

    .cat-card:hover .cat-frame {
      transform: translateY(-4px);
      box-shadow: 0 22px 40px -20px rgba(120, 90, 40, 0.35);
    }

    .cat-card:hover .cat-frame img {
      transform: scale(1.05);
    }

    .cat-name {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 500;
      color: #1A1A1A;
      text-align: center;
    }

    .cat-card:hover .cat-name {
      color: #8E7449;
    }

    /* Category grid */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 24px 18px;
    }

    /* ===== Product card ======================================== */
    .prod-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 280ms cubic-bezier(0.23, 1, 0.32, 1), box-shadow 280ms ease;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.5) inset;
    }

    .prod-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 44px -18px rgba(120, 90, 40, 0.22), 0 1px 0 rgba(255, 255, 255, 0.5) inset;
    }

    .prod-img {
      position: relative;
      aspect-ratio: 1;
      background: #F3EBDC;
      overflow: hidden;
    }

    .prod-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 700ms cubic-bezier(0.33, 1, 0.68, 1);
    }

    .prod-card:hover .prod-img img {
      transform: scale(1.05);
    }

    .prod-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: #fff;
      color: #1A1A1A;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .04em;
      padding: 6px 12px;
      border-radius: 9999px;
      box-shadow: 0 6px 14px -6px rgba(0, 0, 0, 0.10);
    }

    .prod-badge--gold {
      background: #B89657;
      color: #fff;
    }

    .prod-badge--warm {
      background: #C97840;
      color: #fff;
    }

    .prod-badge--ink {
      background: #1A1A1A;
      color: #fff;
    }

    .prod-off {
      position: absolute;
      top: 14px;
      right: 60px;
      background: #C97840;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .14em;
      padding: 5px 10px;
      border-radius: 9999px;
      text-transform: uppercase;
      box-shadow: 0 6px 14px -6px rgba(201, 120, 64, 0.45);
      z-index: 2;
    }

    .heart-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.95);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.18);
      transition: all 220ms ease;
      z-index: 10;
      cursor: pointer;
      opacity: 1 !important;
      pointer-events: all !important;
    }

    .heart-btn:hover {
      color: #C97840;
      transform: scale(1.06);
    }

    .heart-btn.active {
      color: #C97840;
      background: #fff;
    }

    .heart-btn.active .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 300;
    }

    .heart-btn .material-symbols-outlined {
      font-size: 18px;
    }

    .prod-quick {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%) translateY(8px);
      background: rgba(26, 26, 26, 0.92);
      color: #fff;
      padding: 9px 18px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: .02em;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: all 320ms cubic-bezier(0.23, 1, 0.32, 1);
      white-space: nowrap;
      cursor: pointer;
    }

    .prod-quick .material-symbols-outlined {
      font-size: 15px;
    }

    .prod-card:hover .prod-quick {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .prod-body {
      padding: 18px 20px 0;
    }

    .prod-cat {
      font-size: 11px;
      color: #B89657;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .prod-name {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 19px;
      color: #1A1A1A;
      margin-top: 4px;
      letter-spacing: -0.012em;
      line-height: 1.25;
    }

    .prod-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12.5px;
      color: #5E5B59;
    }

    .prod-rating .stars {
      color: #B89657;
      letter-spacing: .12em;
      font-size: 13px;
    }

    .prod-price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 20px 8px;
    }

    .prod-price .now {
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: #1A1A1A;
    }

    .prod-price .was {
      font-size: 13px;
      color: #5E5B59;
      text-decoration: line-through;
    }

    .prod-price .off {
      font-size: 11px;
      color: #C97840;
      font-weight: 600;
    }

    .prod-proof {
      margin: 0 20px 12px;
      padding: 7px 12px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: max-content;
      letter-spacing: .01em;
    }

    .prod-proof .material-symbols-outlined {
      font-size: 14px;
    }

    .prod-proof--warm {
      background: rgba(201, 120, 64, 0.10);
      color: #A8612D;
    }

    .prod-proof--warm .material-symbols-outlined {
      color: #C97840;
    }

    .prod-proof--gold {
      background: rgba(184, 150, 87, 0.12);
      color: #8E7449;
    }

    .prod-proof--gold .material-symbols-outlined {
      color: #B89657;
    }

    .prod-proof--ink {
      background: rgba(26, 26, 26, 0.06);
      color: #1A1A1A;
    }

    .prod-proof--ink .material-symbols-outlined {
      color: #1A1A1A;
    }

    .prod-cta {
      background: #1A1A1A;
      color: #fff;
      border: none;
      margin: 0 0 0;
      font-family: 'Jost', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      padding: 13px 20px;
      cursor: pointer;
      border-radius: 0 0 18px 18px;
      transition: background 250ms ease, transform 220ms ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: auto;
    }

    .prod-cta:hover {
      background: #2A2A2A;
    }

    .prod-cta .material-symbols-outlined {
      font-size: 16px;
    }

    /* ===== Carousel arrows ============================================= */
    .carousel-wrap {
      position: relative;
      overflow: visible;
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 9999px;
      background: #fff;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      cursor: pointer;
      box-shadow: 0 12px 28px -12px rgba(0, 0, 0, 0.25);
      z-index: 10;
      transition: all 220ms ease;
    }

    .carousel-arrow:hover {
      background: #1A1A1A;
      color: #fff;
      transform: translateY(-50%) scale(1.06);
    }

    .carousel-arrow.left {
      left: -22px;
    }

    .carousel-arrow.right {
      right: -22px;
    }

    .carousel-arrow .material-symbols-outlined {
      font-size: 18px;
    }

    /* ===== Modern hero ================================================= */
    .hero {
      position: relative;
      background:
        radial-gradient(70% 70% at 80% 30%, rgba(255, 255, 255, 0.5), transparent 60%),
        linear-gradient(135deg, #F2E8D6 0%, #E6D8BD 100%);
      border-radius: 32px;
      margin: 28px 32px 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      min-height: 540px;
    }

    .hero--fullbleed {
      margin: 0;
      border-radius: 0;
      min-height: 100svh;
    }

    .hero-copy {
      padding: 80px 56px 72px 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .hero-slides-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 22px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      color: #8E7449;
      letter-spacing: .05em;
    }

    .hero-slides-indicator span {
      padding: 1px 4px;
      cursor: pointer;
      transition: color 220ms ease;
    }

    .hero-slides-indicator span.active {
      color: #1A1A1A;
      font-weight: 600;
    }

    .hero-slides-indicator .rule {
      width: 20px;
      height: 1px;
      background: rgba(26, 26, 26, 0.18);
    }

    .hero h1 {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: clamp(2.4rem, 4.2vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.022em;
      color: #1A1A1A;
      margin-bottom: 18px;
    }

    .hero h1 em {
      font-style: italic;
      font-weight: 400;
      color: #B89657;
    }

    .hero-sub {
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      color: rgba(26, 26, 26, 0.55);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .hero-arrows {
      display: flex;
      gap: 10px;
    }

    .hero-photo {
      position: relative;
      overflow: hidden;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.93) brightness(1.02);
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(184, 150, 87, 0.30);
      padding: 6px 14px 6px 11px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #8E7449;
      margin-bottom: 22px;
    }

    .hero-eyebrow__dot {
      width: 6px;
      height: 6px;
      border-radius: 9999px;
      background: #C97840;
      box-shadow: 0 0 0 4px rgba(201, 120, 64, 0.20);
      animation: heroDot 1.8s ease-in-out infinite;
    }

    @keyframes heroDot {

      0%,
      100% {
        box-shadow: 0 0 0 4px rgba(201, 120, 64, 0.20);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(201, 120, 64, 0.08);
      }
    }

    .hero-stats {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(26, 26, 26, 0.10);
      max-width: 460px;
      flex-wrap: wrap;
    }

    .hero-stats>div {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stats b {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: #1A1A1A;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
    }

    .hero-stats span {
      font-size: 11px;
      color: #5E5B59;
      font-weight: 500;
    }

    .hero-stats__star {
      color: #B89657;
      font-size: 14px;
    }

    .hero-stats__divider {
      width: 1px;
      height: 28px;
      background: rgba(26, 26, 26, 0.10);
    }

    .hero-floating-chip {
      position: absolute;
      right: 24px;
      bottom: 24px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 10px 16px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #1A1A1A;
      box-shadow: 0 18px 36px -16px rgba(0, 0, 0, 0.3);
    }

    .hero-floating-chip .stars {
      color: #B89657;
      font-size: 11px;
      letter-spacing: .14em;
    }

    .hero-floating-chip b {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 14px;
    }

    .hero-delivery-chip {
      position: absolute;
      left: 24px;
      top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(26, 22, 20, 0.92);
      color: #fff;
      padding: 10px 16px 10px 12px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11.5px;
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 30px -12px rgba(0, 0, 0, 0.35);
    }

    .hero-delivery-chip .material-symbols-outlined {
      font-size: 18px;
      color: #C5A880;
      background: rgba(197, 168, 128, 0.18);
      width: 28px;
      height: 28px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .hero-delivery-chip>div {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }

    .hero-delivery-chip b {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 13.5px;
      color: #fff;
    }

    .hero-delivery-chip span {
      font-size: 10.5px;
      color: rgba(255, 255, 255, 0.65);
    }

    /* ===== Promo banner ================================================ */
    .promo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #1A1614;
      color: #fff;
      border-radius: 24px;
      overflow: hidden;
      min-height: 280px;
    }

    .promo-copy {
      padding: 56px 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .promo-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: max-content;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #C5A880;
      padding: 6px 14px;
      border-radius: 9999px;
      background: rgba(197, 168, 128, 0.12);
      margin-bottom: 18px;
    }

    .promo-headline {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 48px;
      line-height: 1.06;
      letter-spacing: -0.022em;
      margin-bottom: 28px;
    }

    .promo-headline em {
      font-style: italic;
      font-weight: 400;
      color: #C5A880;
    }

    .promo-photo {
      position: relative;
      overflow: hidden;
      min-height: 200px;
    }

    .promo-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .promo-photo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #1A1614 0%, rgba(26, 22, 20, 0.7) 14%, transparent 40%);
    }

    /* ===== Testimonial card =========================================== */
    .testimonial {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 14px 32px -16px rgba(60, 40, 15, 0.10);
    }

    .testimonial .head-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .testimonial .avatar {
      width: 40px;
      height: 40px;
      border-radius: 9999px;
      background: #ECE0C7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      color: #6B4F1F;
      font-size: 17px;
    }

    .testimonial .name {
      font-weight: 600;
      font-size: 13.5px;
      color: #1A1A1A;
    }

    .testimonial .stars {
      color: #B89657;
      font-size: 13px;
      letter-spacing: .12em;
      margin-top: 2px;
    }

    .testimonial .quote {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 15px;
      line-height: 1.65;
      color: #1A1A1A;
      margin-top: 14px;
    }

    .testimonial .thumb {
      aspect-ratio: 3/4;
      border-radius: 14px;
      overflow: hidden;
      background: #ECE0C7;
    }

    .testimonial .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== Instagram grid ============================================= */
    .ig-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
    }

    .ig-tile {
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      background: #ECE0C7;
      position: relative;
      cursor: pointer;
    }

    .ig-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 600ms ease;
    }

    .ig-tile:hover img {
      transform: scale(1.08);
    }

    .ig-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0, 0, 0, 0.30));
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .ig-tile:hover::after {
      opacity: 1;
    }

    /* ===== Newsletter ================================================= */
    .newsletter {
      background: linear-gradient(135deg, #F5EEDF 0%, #E8DAB8 100%);
      border-radius: 24px;
      padding: 48px;
      margin: 80px auto 60px;
      max-width: 1240px;
      display: grid;
      grid-template-columns: 1.4fr auto;
      gap: 32px;
      align-items: center;
    }

    .newsletter h3 {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 32px;
      letter-spacing: -0.015em;
      margin: 0;
    }

    .newsletter p {
      font-size: 14px;
      color: #5E5B59;
      margin: 6px 0 0;
    }

    .newsletter-form {
      display: flex;
      gap: 10px;
      min-width: 420px;
    }

    .newsletter-input {
      background: #fff;
      border: 1px solid rgba(26, 26, 26, 0.10);
      padding: 14px 22px;
      flex: 1;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      color: #1A1A1A;
      outline: none;
    }

    .newsletter-input::placeholder {
      color: rgba(26, 26, 26, 0.30);
    }

    .newsletter-input:focus {
      border-color: #B89657;
    }

    /* ===== Footer ===================================================== */
    .footer {
      background: #1A1614;
      color: rgba(255, 255, 255, 0.7);
      padding: 64px 0 24px;
    }

    .footer h4 {
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 20px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr 1fr 1.2fr;
      gap: 40px;
    }

    .footer-col ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .footer-col a {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.55);
      transition: color 200ms ease;
    }

    .footer-col a:hover {
      color: #C5A880;
    }

    .footer-col .info-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 13px;
    }

    .footer-col .info-line .material-symbols-outlined {
      color: #C5A880;
      font-size: 17px;
    }

    .footer-socials {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .footer-socials a {
      width: 38px;
      height: 38px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.65);
      transition: all 220ms ease;
    }

    .footer-socials a:hover {
      background: #C5A880;
      color: #1A1A1A;
    }

    .footer-pay {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .footer-pay span {
      font-size: 10px;
      font-weight: 700;
      padding: 5px 9px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.65);
    }

    .footer-bottom {
      margin-top: 48px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-bottom .links {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
    }

    /* ===== Animations ================================================= */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== WA float =================================================== */
    @keyframes wa-pulse {

      0%,
      100% {
        box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
      }

      50% {
        box-shadow: 0 4px 32px rgba(37, 211, 102, 0.75), 0 0 0 8px rgba(37, 211, 102, 0.10);
      }
    }

    .wa-float {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 80;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #25D366;
      color: #fff;
      height: 54px;
      padding: 0 22px 0 18px;
      border-radius: 9999px;
      animation: wa-pulse 2.5s ease-in-out infinite;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }

    .wa-float:hover {
      animation: none;
    }

    .wa-float svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ===== Toast ====================================================== */
    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      z-index: 100;
      background: #1A1A1A;
      color: #fff;
      padding: 14px 24px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 18px 36px -16px rgba(0, 0, 0, 0.4);
      transition: all 320ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .toast--in {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast--out {
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
    }

    /* ===== Why KGS ==================================================== */
    .why-section {
      background: linear-gradient(180deg, #F2E8D6 0%, #ECE0C7 100%);
      border-radius: 32px;
      margin: 24px 32px;
      padding: 72px 0;
    }

    .why-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 44px;
    }

    .why-head .label-tag {
      margin-bottom: 18px;
    }

    .why-head h2 {
      font-size: 40px;
      line-height: 1.08;
      max-width: 640px;
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .why-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 28px 24px 26px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 12px 30px -16px rgba(60, 40, 15, 0.12);
      position: relative;
      transition: all 280ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .why-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px -20px rgba(60, 40, 15, 0.18);
    }

    .why-num {
      position: absolute;
      top: 22px;
      right: 24px;
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 14px;
      color: rgba(184, 150, 87, 0.65);
    }

    .why-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #1A1A1A;
      color: #C5A880;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
    }

    .why-icon .material-symbols-outlined {
      font-size: 24px;
      font-variation-settings: 'wght' 300;
    }

    .why-h {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 19px;
      line-height: 1.2;
      color: #1A1A1A;
      letter-spacing: -0.012em;
      margin-bottom: 8px;
    }

    .why-s {
      font-size: 13px;
      line-height: 1.65;
      color: #5E5B59;
    }

    /* ===== Complete the Look bundle ================================== */
    .bundle {
      display: grid;
      grid-template-columns: 0.95fr 1fr;
      background: #1A1614;
      border-radius: 24px;
      overflow: hidden;
      min-height: 420px;
      color: #fff;
    }

    .bundle-photo {
      position: relative;
      overflow: hidden;
    }

    .bundle-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.95) brightness(0.95);
    }

    .bundle-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 60%, rgba(26, 22, 20, 0.7) 100%);
    }

    .bundle-photo-tag {
      position: absolute;
      left: 22px;
      bottom: 22px;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      padding: 7px 14px;
      border-radius: 9999px;
    }

    .bundle-body {
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: #1A1A1A;
      background: #fff;
    }

    .bundle h2 {
      color: #1A1A1A;
    }

    .bundle p {
      color: #5E5B59;
    }

    .bundle-items {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 24px;
      flex-wrap: wrap;
    }

    .bundle-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #F3EBDC;
      border: 1px solid rgba(184, 150, 87, 0.25);
      border-radius: 14px;
      padding: 10px 14px 10px 10px;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      position: relative;
      transition: all 240ms ease;
    }

    .bundle-item:hover {
      background: #ECE0C7;
      transform: translateY(-2px);
    }

    .bundle-item img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: contain;
      background: #fff;
      padding: 4px;
    }

    .bundle-item__name {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 13px;
      color: #1A1A1A;
      letter-spacing: -0.005em;
      max-width: 130px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bundle-item__price {
      font-size: 11.5px;
      color: #5E5B59;
      margin-top: 1px;
    }

    .bundle-plus {
      font-family: 'Crimson Pro', serif;
      font-weight: 400;
      font-size: 24px;
      color: #B89657;
      margin: 0 4px 0 14px;
    }

    .bundle-cta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 20px;
      border-top: 1px solid rgba(184, 150, 87, 0.20);
    }

    .bundle-price {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bundle-price__strike {
      font-size: 13px;
      color: #5E5B59;
      text-decoration: line-through;
    }

    .bundle-price__now {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 28px;
      color: #1A1A1A;
      letter-spacing: -0.01em;
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
    }

    .bundle-price__now span {
      font-family: 'Jost', sans-serif;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #B89657;
    }

    .bundle-price__save {
      font-size: 11px;
      font-weight: 600;
      color: #C97840;
      letter-spacing: .04em;
      margin-top: 2px;
    }

    /* ===== PDP — stock bar, trust strip, sticky bar ================== */
    .pdp-stock {
      background: rgba(201, 120, 64, 0.06);
      border: 1px solid rgba(201, 120, 64, 0.22);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 22px;
    }

    .pdp-stock__bar {
      height: 6px;
      background: rgba(201, 120, 64, 0.12);
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .pdp-stock__bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #C97840, #A8612D);
      border-radius: 9999px;
      transition: width 600ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .pdp-stock__text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      color: #5E5B59;
    }

    .pdp-stock__text b {
      color: #A8612D;
      font-weight: 600;
    }

    .pdp-stock__text .material-symbols-outlined {
      color: #C97840;
      font-size: 16px;
    }

    .pdp-trust {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px;
      background: #FAF8F4;
      border: 1px solid rgba(197, 168, 128, 0.20);
      border-radius: 14px;
    }

    .pdp-trust__item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .pdp-trust__item .material-symbols-outlined {
      color: #B89657;
      font-size: 22px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .pdp-trust__item b {
      display: block;
      font-size: 12.5px;
      color: #1A1A1A;
      font-weight: 600;
    }

    .pdp-trust__item span {
      font-size: 11.5px;
      color: #5E5B59;
    }

    .pdp-sticky {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(26, 26, 26, 0.06);
      padding: 12px 0;
      z-index: 70;
      box-shadow: 0 -16px 32px -16px rgba(60, 40, 15, 0.18);
    }

    .pdp-sticky .btn {
      padding: 12px 20px;
      font-size: 12.5px;
    }

    /* ===== Cart ====================================================== */
    .cart-progress {
      background: #fff;
      border: 1px solid rgba(184, 150, 87, 0.25);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .cart-progress__head {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      color: #5E5B59;
      margin-bottom: 12px;
    }

    .cart-progress__head b {
      color: #1A1A1A;
      font-weight: 600;
    }

    .cart-progress__head .material-symbols-outlined {
      font-size: 18px;
    }

    .cart-progress__bar {
      height: 7px;
      background: rgba(184, 150, 87, 0.15);
      border-radius: 9999px;
      overflow: hidden;
    }

    .cart-progress__bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #B89657 0%, #25D366 100%);
      border-radius: 9999px;
      transition: width 700ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .cart-badges {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .cart-badges>div {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid rgba(184, 150, 87, 0.20);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #1A1A1A;
    }

    .cart-badges .material-symbols-outlined {
      color: #B89657;
      font-size: 17px;
    }

    /* ===== Checkout & Order Confirmation ============================= */
    .checkout-wrap {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 40px;
      align-items: flex-start;
    }

    .checkout-form-section {
      background: #fff;
      border: 1px solid rgba(197, 168, 128, 0.25);
      border-radius: 18px;
      padding: 32px;
    }

    .checkout-form-section h3 {
      font-family: 'Crimson Pro', serif;
      font-size: 22px;
      margin-bottom: 24px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
    }

    .form-field label {
      font-family: 'Jost', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #5E5B59;
    }

    .form-input {
      padding: 12px 18px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      color: #1A1A1A;
      background: #FAFAF8;
      border: 1px solid rgba(197, 168, 128, 0.35);
      border-radius: 10px;
      outline: none;
      transition: border-color 200ms;
    }

    .form-input:focus {
      border-color: #B89657;
      background: #fff;
    }

    .form-input::placeholder {
      color: rgba(26, 26, 26, 0.30);
    }

    .payment-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1.5px solid rgba(197, 168, 128, 0.30);
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 200ms ease;
    }

    .payment-option.selected {
      border-color: #1A1A1A;
      background: #FAF8F4;
    }

    .payment-option input[type="radio"] {
      accent-color: #1A1A1A;
      width: 16px;
      height: 16px;
    }

    .payment-option-label {
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #1A1A1A;
    }

    .payment-option-sub {
      font-size: 11.5px;
      color: #5E5B59;
      margin-top: 2px;
    }

    .checkout-summary {
      background: #fff;
      border: 1px solid rgba(197, 168, 128, 0.25);
      border-radius: 18px;
      padding: 28px;
      position: sticky;
      top: 96px;
    }

    .checkout-summary h3 {
      font-family: 'Crimson Pro', serif;
      font-size: 20px;
      margin-bottom: 18px;
    }

    .checkout-trust {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      padding: 12px;
      background: #FAF8F4;
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      color: #5E5B59;
    }

    .checkout-trust .material-symbols-outlined {
      font-size: 15px;
      color: #B89657;
    }

    /* Order confirmation */
    .order-confirm-wrap {
      max-width: 640px;
      margin: 0 auto;
      text-align: center;
      padding: 80px 24px;
    }

    .order-confirm-icon {
      font-size: 72px;
      color: #B89657;
      font-variation-settings: 'FILL' 1, 'wght' 300;
      margin-bottom: 24px;
      display: block;
    }

    .order-confirm-wrap h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 2.6rem;
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .order-num {
      display: inline-block;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      padding: 8px 20px;
      background: rgba(184, 150, 87, 0.12);
      border-radius: 9999px;
      color: #8E7449;
      margin-bottom: 20px;
    }

    /* Wishlist page */
    .wishlist-empty {
      text-align: center;

      // Live IST clock
      React.useEffect(() => {
        const tick = () => {
          const ist = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));

        };
        tick();
        const t = setInterval(tick, 30000);

    // ===== CHECKOUT PAGE ========================================================
    function CheckoutPage({ cart, onPlaceOrder, onBack }) {
      const items = cart
        .map(ci => ({ ...ci, product: PRODUCTS.find(p => p.id === ci.id) }))
        .filter(ci => ci.product);
      const subtotal = items.reduce((s, ci) => s + ci.product.price * ci.qty, 0);
      const FREE_OVER = 5000;
      const delivery = subtotal >= FREE_OVER ? 0 : 250;
      const total = subtotal + delivery;

      const [form, setForm] = React.useState({
        name: '', phone: '', address: '', city: '', state: 'Tamil Nadu', pincode: '',
      });
      const [payment, setPayment] = React.useState('upi');
      const [errors, setErrors] = React.useState({});

      const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = 'Required';
        if (!form.phone.trim()) e.phone = 'Required';
        if (!form.address.trim()) e.address = 'Required';
        if (!form.city.trim()) e.city = 'Required';
        if (!form.pincode.trim()) e.pincode = 'Required';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const handleSubmit = (ev) => {
        ev.preventDefault();
        if (validate()) onPlaceOrder(form, payment);
      };

      const inputStyle = (k) => ({
        padding: '12px 18px',
        fontFamily: 'Jost,sans-serif', fontSize: 14, color: '#1A1A1A',
        background: errors[k] ? 'rgba(192,57,43,0.04)' : '#FAFAF8',
        border: '1px solid ' + (errors[k] ? '#C0392B' : 'rgba(197,168,128,0.35)'),
        borderRadius: 10, outline: 'none', width: '100%',
        transition: 'border-color 200ms',
      });

      return (
        <div data-screen-label="Checkout">
          <section style={{ background: '#F2E8D6', padding: '48px 0 32px' }}>
            <div className="container">
              <button
                onClick={onBack}
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#5E5B59', fontSize: 11, fontWeight: 600, letterSpacing: '.18em', textTransform: 'uppercase', display: 'inline-flex', alignItems: 'center', gap: 6, marginBottom: 20 }}>

                        <input

                        {errors.name && <span style={{ fontSize: 11, color: '#C0392B' }}>{errors.name}</span>}
                      </div>
                      <div className="form-field">

                        <input

                          onChange={e => update('phone', e.target.value)}
                        />
                        {errors.phone && <span style={{ fontSize: 11, color: '#C0392B' }}>{errors.phone}</span>}
                      </div>
                      <div className="form-field">
                        <label>Address line 1</label>
                        <input

                          style={inputStyle('address')}
                          placeholder="25, Gandhi Street, Virudhachalam"

  <script type="text/babel">
    /* KGS Home Décors — App root: routing + global state */

    function Toast({ msg, show }) {
      return (
        <div className={'toast ' + (show ? 'toast--in' : 'toast--out')}>
          <span
            className="material-symbols-outlined"
            style={{ color: '#25D366', fontVariationSettings: '"FILL" 1' }}>
            check_circle
          </span>
          <span>{msg}</span>
        </div>
      );
    }

    function App() {
      const [route, setRoute] = React.useState('home');
      const [filter, setFilter] = React.useState('all');
      const [cart, setCart] = React.useState([]);
      const [wishlist, setWish] = React.useState([]);
      const [viewing, setView] = React.useState(null);
      const [toast, setToast] = React.useState({ msg: '', show: false });
      // Preserve cart through checkout so confirmation can show it
      const [lastCart, setLastCart] = React.useState([]);

      React.useEffect(() => {
        const timer = setTimeout(() => {
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.1 });

          document.querySelectorAll('.reveal').forEach(el => {
            observer.observe(el);
          });
        }, 100);
        return () => clearTimeout(timer);
      }, [route]);

      const cartCount = cart.reduce((s, c) => s + c.qty, 0);

      const showToast = (msg) => {
        setToast({ msg, show: true });
        setTimeout(() => setToast(t => ({ ...t, show: false })), 2200);
      };

      const handleAdd = (p, qty = 1) => {
        setCart(prev => {
          const ex = prev.find(c => c.id === p.id);
          if (ex) return prev.map(c => c.id === p.id ? { ...c, qty: c.qty + qty } : c);
          return [...prev, { id: p.id, qty }];
        });
        showToast('Added to cart');
      };

      const handleView = (p) => {
        setView(p);
        setRoute('product');
        window.scrollTo(0, 0);
      };

      const handleWishToggle = (id) => {
        setWish(prev =>
          prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
        );
      };

      const handleCheckout = () => {
        setRoute('checkout');
      };

      const handlePlaceOrder = (formData, paymentMethod) => {
        setLastCart([...cart]);
        setCart([]);
        setRoute('order-confirmation');
        window.scrollTo(0, 0);
      };

      React.useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'instant' });
      }, [route]);

      // Render current page body
      let body = null;

      if (route === 'home') {
        body = (
          <div data-screen-label="Home">
            <Hero
              onShop={() => setRoute('shop')}
              onSellers={() => { setFilter('all'); setRoute('shop'); }}
            />
            <div className="reveal"><TrustStrip /></div>
            <div className="reveal"><CategoryGrid onClick={(c) => { if (c) setFilter(c); setRoute('shop'); }} /></div>
            <div className="reveal"><BestSellers
              onAdd={handleAdd}
              onView={handleView}
              wishlist={wishlist}
              onWishToggle={handleWishToggle}
            /></div>
            <div className="reveal"><PromoBanner onShop={() => setRoute('shop')} /></div>
            <div className="reveal"><Testimonials /></div>
            <div className="reveal"><Instagram /></div>
            <div className="reveal"><Showroom /></div>
          </div>
        );
      } else if (route === 'shop') {
        body = (
          <ShopPage
            filter={filter}
            setFilter={setFilter}
            onAdd={handleAdd}
            onView={handleView}
            wishlist={wishlist}
            onWishToggle={handleWishToggle}
          />
        );
      } else if (route === 'product') {
        body = (
          <ProductDetail
            p={viewing}
            onAdd={handleAdd}
            onBack={() => setRoute('shop')}
          />
        );
      } else if (route === 'cart') {
        body = (
          <CartPage
            cart={cart}
            onChangeQty={(id, qty) => setCart(prev => prev.map(c => c.id === id ? { ...c, qty } : c))}
            onRemove={(id) => setCart(prev => prev.filter(c => c.id !== id))}
            onCheckout={handleCheckout}
            onBack={() => setRoute('shop')}
          />
        );
      } else if (route === 'checkout') {
        body = (
          <CheckoutPage
            cart={cart}
            onPlaceOrder={handlePlaceOrder}
            onBack={() => setRoute('cart')}
          />
        );
      } else if (route === 'order-confirmation') {
        body = (
          <OrderConfirmationPage
            cart={lastCart}
            onKeepShopping={() => setRoute('shop')}
          />
        );
      } else if (route === 'wishlist') {
        body = (
          <WishlistPage
            wishlist={wishlist}
            onAdd={handleAdd}
            onView={handleView}
            onWishToggle={handleWishToggle}
            onShop={() => setRoute('shop')}
          />
        );
      } else if (route === 'about') {
        body = <AboutPage onShop={() => setRoute('shop')} />;
      } else if (route === 'contact') {
        body = <ContactPage />;
      } else if (route === 'account') {
        // If we had a real auth state, we'd check it here. For the prototype, we just go to login or dashboard.
        body = <AccountDashboardPage onLogout={() => setRoute('home')} onShop={() => setRoute('shop')} />;
      } else if (route === 'login') {
        body = <AccountLoginPage onRegister={() => setRoute('register')} onLogin={() => setRoute('account')} />;
      } else if (route === 'register') {
        body = <AccountRegisterPage onLogin={() => setRoute('login')} onRegister={() => setRoute('account')} />;
      } else if (route === 'privacy') {
        body = <PrivacyPolicyPage />;
      } else if (route === 'terms') {
        body = <TermsPage />;
      } else if (route === 'returns') {
        body = <ReturnPolicyPage />;
      } else if (route === 'shipping') {
        body = <ShippingPolicyPage />;
      } else {
        body = <div style={{ minHeight: '60vh' }} />;
      }

      return (
        <div>
          <Nav
            route={route}
            setRoute={setRoute}
            cart={cartCount}
            wishlist={wishlist.length}
            onSearch={() => showToast('Search coming soon')}
          />
          <main>{body}</main>
          <Footer setRoute={setRoute} />
          <WAFloat />
          <Toast msg={toast.msg} show={toast.show} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>

</html>
