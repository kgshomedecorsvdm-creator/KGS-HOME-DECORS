    /* ============================================================================
   KGS HOME DÉCORS — DESIGN TOKENS
   Premium furniture & home décor brand
   Virudhachalam, Tamil Nadu — kgshomedecors.in
   ============================================================================ */

    /* ---- WEBFONTS (Google Fonts — same as production) -------------------------- */
    :root {

      /* ──────────────────────────────────────────────────────────────────────────
     COLORS — warm-neutral palette inspired by Tamil Nadu interior craft.
     Bone-paper base, soft ink text, antique-gold accent, terracotta CTA.
     ────────────────────────────────────────────────────────────────────────── */

      /* Surfaces */
      --base: #FAF8F4;
      /* page background — soft bone */
      --tint: #F3EDE4;
      /* sections / banners / panels */
      --surface: #FDF9F3;
      /* cards / nav / elevated surfaces */
      --white: #FFFFFF;

      /* Ink / text */
      --ink: #1A1A1A;
      /* primary headings + body */
      --muted: #5E5B59;
      /* secondary copy, captions */
      --soft: #767270;
      /* nav links inactive */
      --label: #7A5C1E;
      /* eyebrow / overline (WCAG-AA on surface) */

      /* Brand accents */
      --gold: #C5A880;
      /* antique-gold — borders, icons, hover */
      --gold-dark: #A8916B;
      /* gold hover state */
      --warm: #C97840;
      /* terracotta — CTAs, badges, price-cut */
      --warm-dark: #A8612D;
      /* terracotta hover */
      --warm-soft: #E8B58A;
      /* warm tint, decorative */

      /* Borders & dividers */
      --border: #E4DDD4;
      --border-soft: rgba(26, 26, 26, 0.06);
      --border-strong: rgba(26, 26, 26, 0.30);

      /* Status / utility (used sparingly) */
      --success: #25D366;
      /* WhatsApp green — also used as success */
      --info: #4285F4;
      /* Google blue (reviews only) */
      --error: #C0392B;

      /* Selection */
      --selection-bg: var(--gold);
      --selection-fg: #fff;


      /* ──────────────────────────────────────────────────────────────────────────
     TYPOGRAPHY — serif display × sans body
     ────────────────────────────────────────────────────────────────────────── */

      /* Families */
      --font-serif: 'Crimson Pro', 'Georgia', serif;
      /* display, headings, quotes */
      --font-sans: 'Jost', 'Helvetica Neue', sans-serif;
      /* body, UI, labels */
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;

      /* Weights */
      --w-light: 300;
      --w-regular: 400;
      --w-medium: 500;
      --w-semi: 600;
      --w-bold: 700;

      /* Type scale (clamp-based, fluid) */
      --t-hero: clamp(3rem, 6vw, 5.5rem);
      /* H1 hero — "Design Your Space" */
      --t-h1: clamp(2.4rem, 5vw, 4.5rem);
      /* page hero */
      --t-h2: clamp(1.9rem, 3.5vw, 3rem);
      /* section titles */
      --t-h3: clamp(1.5rem, 2.5vw, 2rem);
      /* card titles */
      --t-h4: 1.2rem;
      /* value-card titles */
      --t-lead: 1.125rem;
      /* lead paragraph */
      --t-body: 0.9375rem;
      /* default body 15px */
      --t-sm: 0.8125rem;
      /* secondary 13px */
      --t-xs: 0.6875rem;
      /* eyebrow / label 11px */
      --t-2xs: 0.625rem;
      /* nav micro-cap 10px */

      /* Line-height */
      --lh-tight: 1.1;
      --lh-snug: 1.3;
      --lh-normal: 1.6;
      --lh-relaxed: 1.85;
      --lh-loose: 1.9;

      /* Letter-spacing — generous tracking is a KGS signature on uppercase labels */
      --ls-hero: -0.01em;
      --ls-tight: -0.005em;
      --ls-normal: 0;
      --ls-label: 0.14em;
      --ls-eyebrow: 0.22em;
      --ls-logo: 0.35em;
      /* the "KGS" wordmark spacing */


      /* ──────────────────────────────────────────────────────────────────────────
     SPACING — 4px baseline grid
     ────────────────────────────────────────────────────────────────────────── */
      --s-0: 0;
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 20px;
      --s-6: 24px;
      --s-8: 32px;
      --s-10: 40px;
      --s-12: 48px;
      --s-16: 64px;
      --s-20: 80px;
      /* section vertical rhythm */
      --s-24: 96px;
      --s-28: 112px;

      /* Layout */
      --max-w: 1440px;
      /* page max width (90rem) */
      --gutter: 48px;
      /* px-12 on desktop */
      --gutter-sm: 20px;
      /* px-5 on mobile */
      --nav-h: 96px;
      /* h-24 desktop */
      --nav-h-sm: 80px;
      /* h-20 mobile */


      /* ──────────────────────────────────────────────────────────────────────────
     RADII — KGS uses sharp + subtle, never pillowy. Big sculpted corners
     appear ONLY on hero image masks (asymmetric tl/br).
     ────────────────────────────────────────────────────────────────────────── */
      --r-none: 0;
      --r-sm: 4px;
      /* small chips, skeletons */
      --r-md: 6px;
      /* default — cards, inputs */
      --r-lg: 12px;
      --r-pill: 9999px;
      /* CTA buttons in some contexts, badges */
      --r-hero-tl: 200px;
      /* signature asymmetric hero mask top-left */
      --r-hero-br: 40px;
      /* signature asymmetric hero mask bottom-right */


      /* ──────────────────────────────────────────────────────────────────────────
     SHADOWS — premium = restrained. Long, soft, far-offset.
     ────────────────────────────────────────────────────────────────────────── */
      --sh-none: none;
      --sh-xs: 0 4px 12px rgba(0, 0, 0, 0.04);
      --sh-sm: 0 10px 30px -5px rgba(0, 0, 0, 0.03);
      --sh-md: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
      --sh-lg: 0 12px 40px -10px rgba(0, 0, 0, 0.08);
      --sh-hover: 0 20px 40px -10px rgba(26, 26, 26, 0.10);
      --sh-cta: 0 4px 14px rgba(201, 120, 64, 0.15);
      --sh-cta-hov: 0 20px 40px -10px rgba(201, 120, 64, 0.45);
      --sh-wa: 0 4px 20px rgba(37, 211, 102, 0.40);


      /* ──────────────────────────────────────────────────────────────────────────
     MOTION — "premium" easing curves. Quick punch on press, slow on reveal.
     ────────────────────────────────────────────────────────────────────────── */
      --ease-punch: cubic-bezier(0.23, 1, 0.32, 1);
      /* hero, hover */
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
      /* drawers, modals */
      --ease-cta: cubic-bezier(0.25, 1, 0.5, 1);
      /* buttons */
      --ease-img: cubic-bezier(0.33, 1, 0.68, 1);
      /* image zoom */

      --t-fast: 160ms;
      --t-base: 250ms;
      --t-slow: 400ms;
      --t-image: 700ms;
      /* image zoom-in on hover */
    }


    /* ============================================================================
   SEMANTIC TYPE RECIPES — apply to real HTML elements
   ============================================================================ */

    html,
    body {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--ink);
      background: var(--base);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: var(--lh-normal);
    }

    ::selection {
      background: var(--selection-bg);
      color: var(--selection-fg);
    }

    /* Display & headings — Crimson Pro, never bold, medium weight is the KGS look */
    .t-hero,
    h1.t-hero {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-hero);
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-hero);
      color: var(--ink);
    }

    h1,
    .t-h1 {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-h1);
      line-height: var(--lh-tight);
      letter-spacing: var(--ls-tight);
    }

    h2,
    .t-h2 {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-h2);
      line-height: var(--lh-snug);
    }

    h3,
    .t-h3 {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-h3);
      line-height: var(--lh-snug);
    }

    h4,
    .t-h4 {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: var(--t-h4);
      line-height: var(--lh-snug);
    }

    /* Body */
    p,
    .t-body {
      font-family: var(--font-sans);
      font-size: var(--t-body);
      line-height: var(--lh-relaxed);
      color: var(--muted);
    }

    .t-lead {
      font-family: var(--font-sans);
      font-size: var(--t-lead);
      line-height: var(--lh-loose);
      color: var(--muted);
    }

    .t-small {
      font-size: var(--t-sm);
      line-height: var(--lh-normal);
      color: var(--muted);
    }

    /* Eyebrow / overline — small uppercase, wide tracking. KGS uses this everywhere
   to introduce a section. Gold or label-amber on warm bg. */
    .t-eyebrow {
      font-family: var(--font-sans);
      font-size: var(--t-xs);
      font-weight: var(--w-semi);
      text-transform: uppercase;
      letter-spacing: var(--ls-eyebrow);
      color: var(--label);
    }

    .t-eyebrow--gold {
      color: var(--gold);
    }

    .t-eyebrow--ink {
      color: var(--ink);
    }

    /* Nav link cap */
    .t-nav {
      font-family: var(--font-sans);
      font-size: var(--t-xs);
      font-weight: var(--w-medium);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--soft);
    }

    /* Button label */
    .t-btn {
      font-family: var(--font-sans);
      font-size: var(--t-xs);
      font-weight: var(--w-semi);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
    }

    /* Logo wordmark */
    .t-logo {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      letter-spacing: var(--ls-logo);
      color: var(--ink);
    }

    /* Italic serif — used in testimonials/quotes */
    .t-quote {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: var(--w-regular);
      line-height: var(--lh-relaxed);
      color: var(--ink);
    }

    /* Price (current) */
    .t-price {
      font-family: var(--font-serif);
      font-weight: var(--w-medium);
      font-size: 1.4rem;
      color: var(--ink);
    }

    .t-price--strike {
      font-family: var(--font-sans);
      font-size: var(--t-sm);
      color: var(--muted);
      text-decoration: line-through;
    }

    /* KGS Home Décors — Component Styles 2026 */
    * {
      box-sizing: border-box;
    }

      margin: 0;
      padding: 0;
    }
    body {
      margin: 0;

    body {
      font-family: 'Jost', sans-serif;

    }

    a {

    button {

    img {

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';

      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    .container {
      max-width: 1320px;

    }

    /* ===== Buttons — pill, generous ============================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;

    .btn-dark:hover {

    }

    .btn-ghost {
      background: transparent;
      color: #1A1A1A;
      border: 1px solid rgba(26, 26, 26, 0.18);
    }

    .btn-ghost:hover {
      background: #1A1A1A;
      color: #fff;
      border-color: #1A1A1A;
    }

/* Account Dashboard Styles */
.account-page { padding-top: 40px; padding-bottom: 80px; }
.account-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid rgba(26,26,26,0.05); }
.account-grid { display: grid; grid-template-columns: 240px 1fr; gap: 48px; }
.account-nav { display: flex; flex-direction: column; gap: 8px; }
.account-nav-item { 
  display: flex; 
  align-items: center; 
  gap: 12px; 
  padding: 12px 16px; 
  border-radius: 12px; 
  cursor: pointer; 
  color: #5E5B59; 
  transition: all 0.2s;
  font-weight: 500;
  font-size: 15px;
}
.account-nav-item:hover { background: rgba(184,150,87,0.05); color: #B89657; }
.account-nav-item.active { background: #B89657; color: #fff; }
.account-nav-item .material-symbols-outlined { font-size: 20px; }
.account-main h2 { margin-bottom: 24px; font-weight: 600; }

/* Tracking Timeline Styles */
.tracking-timeline { display: flex; flex-direction: column; gap: 0; position: relative; margin-top: 20px; }
.tracking-step { position: relative; padding-left: 45px; padding-bottom: 32px; border-left: 2px solid rgba(184,150,87,0.15); }
.tracking-step:last-child { border-left-color: transparent; padding-bottom: 0; }
.tracking-icon { 
  position: absolute; 
  left: -16px; 
  top: 0; 
  width: 30px; 
  height: 30px; 
  border-radius: 50%; 
  background: #fff; 
  border: 2px solid rgba(184,150,87,0.15); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  z-index: 2;
  transition: all 0.3s;
}
.tracking-icon span { font-size: 16px; color: #9E9B98; }
.tracking-step.done .tracking-icon { background: #B89657; border-color: #B89657; }
.tracking-step.done .tracking-icon span { color: #fff; }
.tracking-step.active .tracking-icon { border-color: #B89657; }
.tracking-step.active .tracking-icon span { color: #B89657; }
.tracking-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: #1A1A1A; }
.tracking-info p { font-size: 13px; color: #5E5B59; margin-bottom: 4px; }
.tracking-time { font-size: 11px; font-weight: 600; color: #B89657; text-transform: uppercase; letter-spacing: .05em; }

@media (max-width: 768px) {
  .account-grid { grid-template-columns: 1fr; gap: 32px; }
  .account-header { flex-direction: column; align-items: flex-start; gap: 20px; }
  .account-nav { flex-direction: row; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; width: 100vw; margin-left: -20px; padding-left: 20px; }
  .account-nav-item { white-space: nowrap; }
  .addr-grid-2, .addr-grid-3 { grid-template-columns: 1fr !important; }
}

    .btn-cream {
      background: #fff;
      color: #1A1A1A;
      border: 1px solid rgba(26, 26, 26, 0.10);
    }

    .btn-cream:hover {
      box-shadow: 0 14px 28px -14px rgba(0, 0, 0, 0.18);

    .btn .material-symbols-outlined {
      font-size: 17px;
