    /* Tiny pill chip */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(26, 26, 26, 0.06);
      padding: 7px 14px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      color: #1A1A1A;
    }

    .chip .dot {
      width: 6px;
      height: 6px;
      background: #25D366;
      border-radius: 9999px;
    }

    /* ===== Announce bar ============================================== */
    .announce {
      background: #1A1614;
      color: rgba(255, 255, 255, 0.78);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-family: 'Jost', sans-serif;
      position: relative;
      z-index: 60;
      overflow: hidden;
    }

    /* Subtle shimmer line that sweeps across on each message change */
    @keyframes barShimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .announce::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 25%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(197,168,128,0.07), transparent);
      animation: barShimmer 4s linear infinite;
      pointer-events: none;
    }

    .announce-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 40px;
      font-size: 11.5px;
      gap: 28px;
    }

    .announce-side {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 11px;
      letter-spacing: .04em;
    }

    .announce-side--right {
      justify-self: end;
      gap: 14px;
    }

    .announce-side a {
      color: rgba(255, 255, 255, 0.65);
      transition: color 200ms ease;
      letter-spacing: .03em;
    }

    .announce-side a:hover {
      color: #C5A880;
    }

    .announce-side .material-symbols-outlined {
      color: #C5A880;
      font-size: 14px;
    }

    .announce-divider {
      width: 1px;
      height: 10px;
      background: rgba(255, 255, 255, 0.10);
    }

    /* Progress dots */
    .announce-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-right: 14px;
    }
    .announce-dot {
      width: 4px;
      height: 4px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.18);
      transition: all 400ms ease;
    }
    .announce-dot.active {
      width: 16px;
      background: #C5A880;
    }

    .announce-center {
      position: relative;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 380px;
      text-align: center;
    }

    .announce-msg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: #fff;
      font-size: 11.5px;
      letter-spacing: .03em;
      white-space: nowrap;
      transition: opacity 500ms cubic-bezier(0.23,1,0.32,1), transform 500ms cubic-bezier(0.23,1,0.32,1);
    }

    .announce-msg b {
      color: #C5A880;
      font-weight: 600;
    }

    .announce-msg .material-symbols-outlined {
      color: #C5A880;
      font-size: 15px;
    }

    .announce-msg.in {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    .announce-msg.out-up {
      opacity: 0;
      transform: translate(-50%, calc(-50% - 10px));
      pointer-events: none;
    }

    .announce-msg.out-down {
      opacity: 0;
      transform: translate(-50%, calc(-50% + 10px));
      pointer-events: none;
    }

    /* ===== Premium Dynamic Nav ========================== */
    .nav-wrap {
      position: sticky;
      top: 20px;
      z-index: 50;
      padding: 0 32px;
      transition: transform 500ms cubic-bezier(0.16, 1, 0.3, 1), top 500ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Hidden state — slides up off-screen */
    .nav-wrap.nav--hidden {
      transform: translateY(calc(-100% - 40px));
    }

    /* Scrolled state — pill becomes a sleek, high-end floating bar */
    .nav-wrap.nav--scrolled {
      top: 12px;
    }

    .nav-wrap.nav--scrolled .nav-bar {
      height: 52px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(40px) saturate(200%);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.04);
      border-color: transparent;
      padding: 0 20px;
    }

    .nav-bar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
      height: 68px;
      background: rgba(255, 255, 255, 0.80);
      backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 9999px;
      padding: 0 28px;
      box-shadow: 0 12px 32px -12px rgba(60, 40, 15, 0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      max-width: 1320px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      transition: all 500ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Scroll progress bar — sits at bottom of nav, fades at edges */
    .nav-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 1.5px;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, #C5A880, #B89657, transparent);
      width: 0%;
      pointer-events: none;
      box-shadow: 0 -1px 4px rgba(184, 150, 87, 0.4);
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      cursor: pointer;
    }

    .logo .mark {
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      font-size: 1.45rem;
      letter-spacing: .03em;
      color: #1A1A1A;
    }

    .logo .sub {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: #B89657;
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
      justify-self: center;
    }

    .nav-link {
      position: relative;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #5E5B59;
      cursor: pointer;
      transition: color 300ms ease;
      padding: 6px 4px;
    }

    .nav-link.active,
    .nav-link:hover {
      color: #1A1A1A;
    }

    /* Animated underline — smooth scale from center */
    .nav-link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      border-radius: 9999px;
      background: #B89657;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 400ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-link.active::after,
    .nav-link:hover::after {
      transform: scaleX(1);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #1A1A1A;
    }

    .icon-btn {
      background: rgba(26, 26, 26, 0.03);
      border: 1px solid transparent;
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      cursor: pointer;
      transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .icon-btn:hover {
      background: #1A1A1A;
      color: #fff;
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 24px -8px rgba(0,0,0,0.28);
    }
    
    .icon-btn:active {
      transform: scale(0.95);
    }

    .pip {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 18px;
      height: 18px;
      background: #C97840;
      border-radius: 9999px;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 4px 8px rgba(201, 120, 64, 0.3);
      transition: transform 300ms cubic-bezier(0.16,1,0.3,1);
    }
    
    .icon-btn:hover .pip {
      transform: scale(1.1) translateY(-1px);
      border-color: #1A1A1A;
    }

    /* Hamburger — mobile only */
    .hamburger-btn {
      display: none;
      background: rgba(26, 26, 26, 0.04);
      border: none;
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 9999px;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .hamburger-btn:hover {
      background: #1A1A1A;
      color: #fff;
    }

    /* Mobile nav drawer — smooth slide transition */
    .mobile-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 200;
      pointer-events: none;
      visibility: hidden;
    }

    .mobile-nav.open {
      pointer-events: all;
      visibility: visible;
    }

    .mobile-nav-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26, 22, 20, 0.60);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 320ms ease;
    }

    .mobile-nav.open .mobile-nav-overlay {
      opacity: 1;
    }

    .mobile-nav-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 300px;
      max-width: calc(100vw - 56px);
      background: #FDFAF5;
      padding: 28px 28px 48px;
      padding-bottom: calc(48px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: -24px 0 56px rgba(0, 0, 0, 0.22);
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 380ms cubic-bezier(0.32, 0.72, 0, 1);
    }

    .mobile-nav.open .mobile-nav-panel {
      transform: translateX(0);
    }

    .mobile-nav-close {
      align-self: flex-end;
      background: rgba(26, 26, 26, 0.06);
      border: none;
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 200ms ease;
    }

    .mobile-nav-close:hover { background: #1A1A1A; color: #fff; }

    .mobile-nav-link {
      font-family: 'Jost', sans-serif;
      font-size: 17px;
      font-weight: 500;
      color: #1A1A1A;
      padding: 14px 0;
      border-bottom: 1px solid rgba(197, 168, 128, 0.18);
      cursor: pointer;
      letter-spacing: .01em;
      transition: color 200ms ease, padding-left 200ms ease;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .mobile-nav-link:last-of-type { border-bottom: none; }

    .mobile-nav-link:hover,
    .mobile-nav-link.active {
      color: #B89657;
      padding-left: 4px;
    }

    /* ===== Trust strip ========================================= */
    .trust-strip {
      background: #fff;
      padding: 28px 0;
      margin-top: 12px;
    }

    .trust-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
      align-items: center;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .trust-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(184, 150, 87, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #B89657;
    }

    .trust-icon .material-symbols-outlined {
      font-size: 22px;
      font-variation-settings: 'wght' 300;
    }

    .trust-title {
      font-size: 13px;
      font-weight: 600;
      color: #1A1A1A;
    }

    .trust-sub {
      font-size: 11.5px;
      color: #5E5B59;
      margin-top: 2px;
    }

    /* ===== Label tag ============================================ */
    .label-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 9999px;
      background: rgba(184, 150, 87, 0.12);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #8E7449;
      margin-bottom: 14px;
    }

    /* ===== Section heading ======================================= */
    .section {
      padding: 80px 0;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .section-head h2 {
      font-size: 36px;
      line-height: 1.1;
    }

    .section-head .label-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 9999px;
      background: rgba(184, 150, 87, 0.12);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #8E7449;
      margin-bottom: 14px;
    }

    .section-head .view-all {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #1A1A1A;
      padding: 10px 18px;
      border-radius: 9999px;
      background: #fff;
      border: 1px solid rgba(26, 26, 26, 0.06);
      transition: all 220ms ease;
    }

    .section-head .view-all:hover {
      background: #1A1A1A;
      color: #fff;
      border-color: #1A1A1A;
    }

    .section-head .view-all .material-symbols-outlined {
      font-size: 15px;
    }

    /* ===== Category card ======================================== */
    .cat-card {
      cursor: pointer;
    }

    .cat-frame {
      aspect-ratio: 1;
      background: #ECE0C7;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      transition: transform 320ms cubic-bezier(0.23, 1, 0.32, 1), box-shadow 320ms ease;
    }

    .cat-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.92) brightness(1.02);
      transition: transform 700ms cubic-bezier(0.33, 1, 0.68, 1);
    }

    .cat-card:hover .cat-frame {
      transform: translateY(-4px);
      box-shadow: 0 22px 40px -20px rgba(120, 90, 40, 0.35);
    }

    .cat-card:hover .cat-frame img {
      transform: scale(1.06);
    }

    .cat-name {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 500;
      color: #1A1A1A;
      text-align: center;
    }

    .cat-card:hover .cat-name {
      color: #8E7449;
    }

    /* Category grid */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 24px 18px;
    }

    /* ===== Product card ======================================== */
    .prod-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 280ms cubic-bezier(0.23, 1, 0.32, 1), box-shadow 280ms ease;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.5) inset;
    }

    .prod-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 44px -18px rgba(120, 90, 40, 0.22), 0 1px 0 rgba(255, 255, 255, 0.5) inset;
    }

    .prod-img {
      position: relative;
      aspect-ratio: 1;
      background: #F3EBDC;
      overflow: hidden;
      touch-action: manipulation;
    }

    .prod-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 10px;
      transition: transform 700ms cubic-bezier(0.33, 1, 0.68, 1);
    }

    .prod-card:hover .prod-img img {
      transform: scale(1.03);
    }

    .prod-badge {
      background: #fff;
      color: #1A1A1A;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .04em;
      padding: 6px 12px;
      border-radius: 9999px;
      box-shadow: 0 6px 14px -6px rgba(0, 0, 0, 0.10);
    }

    .prod-badge--gold {
      background: #B89657;
      color: #fff;
    }

    .prod-badge--warm {
      background: #C97840;
      color: #fff;
    }

    .prod-badge--ink {
      background: #1A1A1A;
      color: #fff;
    }

    .prod-off {
      background: #C97840;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .14em;
      padding: 5px 10px;
      border-radius: 9999px;
      text-transform: uppercase;
      box-shadow: 0 6px 14px -6px rgba(201, 120, 64, 0.45);
    }

    .heart-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.95);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.18);
      transition: transform 220ms ease, background 220ms ease, box-shadow 220ms ease, color 220ms ease;
      z-index: 10;
      cursor: pointer;
      opacity: 1 !important;
      pointer-events: all !important;
      touch-action: manipulation;
    }

    .heart-btn:hover {
      color: #C97840;
      transform: scale(1.06);
    }

    .heart-btn.active {
      color: #C97840;
      background: #fff;
    }

    .heart-btn.active .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 300;
    }

    .heart-btn .material-symbols-outlined {
      font-size: 18px;
      font-variation-settings: 'FILL' 0, 'wght' 300;
    }

    .prod-quick {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%) translateY(8px);
      background: rgba(26, 26, 26, 0.92);
      color: #fff;
      padding: 9px 18px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: .02em;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: all 320ms cubic-bezier(0.23, 1, 0.32, 1);
      white-space: nowrap;
      cursor: pointer;
    }

    .prod-quick .material-symbols-outlined {
      font-size: 15px;
    }

    .prod-card:hover .prod-quick {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .prod-body {
      padding: 18px 20px 0;
    }

    .prod-cat {
      font-size: 11px;
      color: #B89657;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .prod-name {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 19px;
      color: #1A1A1A;
      margin-top: 4px;
      letter-spacing: -0.012em;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .prod-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12.5px;
      color: #5E5B59;
    }

    .prod-rating .stars {
      color: #B89657;
      letter-spacing: .12em;
      font-size: 13px;
    }

    .prod-price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 20px 8px;
    }

    .prod-price .now {
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 18px;
      color: #1A1A1A;
    }

    .prod-price .was {
      font-size: 13px;
      color: #5E5B59;
      text-decoration: line-through;
    }

    .prod-price .off {
      font-size: 11px;
      color: #C97840;
      font-weight: 600;
    }

    .prod-proof {
      margin: 0 20px 12px;
      padding: 7px 12px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: max-content;
      letter-spacing: .01em;
    }

    .prod-proof .material-symbols-outlined {
      font-size: 14px;
    }

    .prod-proof--warm {
      background: rgba(201, 120, 64, 0.10);
      color: #A8612D;
    }

    .prod-proof--warm .material-symbols-outlined {
      color: #C97840;
    }

    .prod-proof--gold {
      background: rgba(184, 150, 87, 0.12);
      color: #8E7449;
    }

    .prod-proof--gold .material-symbols-outlined {
      color: #B89657;
    }

    .prod-proof--ink {
      background: rgba(26, 26, 26, 0.06);
      color: #1A1A1A;
    }

    .prod-proof--ink .material-symbols-outlined {
      color: #1A1A1A;
    }

    .prod-cta {
      background: #1A1A1A;
      color: #fff;
      border: none;
      margin: 0 0 0;
      font-family: 'Jost', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      padding: 13px 20px;
      cursor: pointer;
      border-radius: 0 0 18px 18px;
      transition: background 250ms ease, transform 220ms ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: auto;
    }

    .prod-cta:hover {
      background: #2A2A2A;
    }

    .prod-cta .material-symbols-outlined {
      font-size: 16px;
    }

    /* ===== Carousel arrows ============================================= */
    .carousel-wrap {
      position: relative;
      overflow: visible;
    }

    .best-sellers-track {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    /* ── Shop Page Product Grid — fully responsive ──────────────────── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    /* Large desktop: 5 columns */
    @media (min-width: 1400px) {
      .shop-grid { grid-template-columns: repeat(5, 1fr); }
    }

    /* Tablet: 3 columns */
    @media (max-width: 1023px) {
      .shop-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }

    /* Mobile: 2 columns — compact, touch-optimised */
    @media (max-width: 639px) {
      .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }

      /* Card body */
      .prod-body        { padding: 10px 11px 0; }
      .prod-cat         { font-size: 9px; }
      .prod-name        { font-size: 13.5px; margin-top: 3px; }
      .prod-rating      { margin-top: 5px; font-size: 10px; gap: 3px; }
      .prod-rating .stars { font-size: 10px; }

      /* Price */
      .prod-price       { padding: 6px 11px 5px; gap: 5px; }
      .prod-price .now  { font-size: 13.5px; }
      .prod-price .was  { font-size: 10.5px; }

      /* Proof badge */
      .prod-proof       { margin: 0 11px 8px; padding: 5px 9px; font-size: 9.5px; }

      /* CTA — full-width, touch-friendly height */
      .prod-cta         { font-size: 10.5px; padding: 10px 11px; gap: 4px; }
      .prod-cta .material-symbols-outlined { font-size: 13px; }

      /* Heart button — 44×44 touch target via padding, smaller visual */
      .heart-btn        { width: 30px; height: 30px; top: 7px; right: 7px; }
      .heart-btn .material-symbols-outlined { font-size: 15px; }

      /* Badges */
      .prod-badge       { font-size: 8.5px; padding: 4px 8px; }
      .prod-off         { font-size: 8.5px; padding: 4px 8px; }

      /* Image — tighter padding on small cards */
      .prod-img img     { padding: 6px; }

      /* Disable hover animations — touch screens don't hover */
      .prod-card:hover              { transform: none; box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset; }
      .prod-card:hover .prod-img img { transform: none; }
      .prod-card:hover .prod-quick  { opacity: 0; transform: translateX(-50%) translateY(8px); }

      /* Promo banner — fix overflow */
      .promo-banner     { padding: 36px 24px !important; gap: 28px !important; }
      .promo-btn-card   { width: 100% !important; flex: 1 1 auto !important; padding: 24px !important; }
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 9999px;
      background: #fff;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1A1A1A;
      cursor: pointer;
      box-shadow: 0 12px 28px -12px rgba(0, 0, 0, 0.25);
      z-index: 10;
      transition: all 220ms ease;
    }

    .carousel-arrow:hover {
      background: #1A1A1A;
      color: #fff;
      transform: translateY(-50%) scale(1.06);
    }

    .carousel-arrow.left {
      left: -22px;
    }

    .carousel-arrow.right {
      right: -22px;
    }

    .carousel-arrow .material-symbols-outlined {
      font-size: 18px;
    }

    /* ===== Modern hero ================================================= */
    .hero {
      position: relative;
      background:
        radial-gradient(70% 70% at 80% 30%, rgba(255, 255, 255, 0.5), transparent 60%),
        linear-gradient(135deg, #F2E8D6 0%, #E6D8BD 100%);
      border-radius: 32px;
      margin: 28px 32px 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      min-height: 540px;
    }

    .hero--fullbleed {
      margin: 0;
      border-radius: 0;
      min-height: 100svh;
    }

    .hero-copy {
      padding: 80px 56px 72px 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .hero-slides-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 22px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      color: #8E7449;
      letter-spacing: .05em;
    }

    .hero-slides-indicator span {
      padding: 1px 4px;
      cursor: pointer;
      transition: color 220ms ease;
    }

    .hero-slides-indicator span.active {
      color: #1A1A1A;
      font-weight: 600;
    }

    .hero-slides-indicator .rule {
      width: 20px;
      height: 1px;
      background: rgba(26, 26, 26, 0.18);
    }

    .hero h1 {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: clamp(2.4rem, 4.2vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.022em;
      color: #1A1A1A;
      margin-bottom: 18px;
    }

    .hero h1 em {
      font-style: italic;
      font-weight: 400;
      color: #B89657;
    }

    .hero-sub {
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      color: rgba(26, 26, 26, 0.55);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .hero-arrows {
      display: flex;
      gap: 10px;
    }

    .hero-photo {
      position: relative;
      overflow: hidden;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.93) brightness(1.02);
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(184, 150, 87, 0.30);
      padding: 6px 14px 6px 11px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #8E7449;
      margin-bottom: 22px;
    }

    .hero-eyebrow__dot {
      width: 6px;
      height: 6px;
      border-radius: 9999px;
      background: #C97840;
      box-shadow: 0 0 0 4px rgba(201, 120, 64, 0.20);
      animation: heroDot 1.8s ease-in-out infinite;
    }

    @keyframes heroDot {

      0%,
      100% {
        box-shadow: 0 0 0 4px rgba(201, 120, 64, 0.20);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(201, 120, 64, 0.08);
      }
    }

    .hero-stats {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(26, 26, 26, 0.10);
      max-width: 460px;
      flex-wrap: wrap;
    }

    .hero-stats>div {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stats b {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: #1A1A1A;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
    }

    .hero-stats span {
      font-size: 11px;
      color: #5E5B59;
      font-weight: 500;
    }

    .hero-stats__star {
      color: #B89657;
      font-size: 14px;
    }

    .hero-stats__divider {
      width: 1px;
      height: 28px;
      background: rgba(26, 26, 26, 0.10);
    }

    .hero-floating-chip {
      position: absolute;
      right: 24px;
      bottom: 24px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 10px 16px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #1A1A1A;
      box-shadow: 0 18px 36px -16px rgba(0, 0, 0, 0.3);
    }

    .hero-floating-chip .stars {
      color: #B89657;
      font-size: 11px;
      letter-spacing: .14em;
    }

    .hero-floating-chip b {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 14px;
    }

    .hero-delivery-chip {
      position: absolute;
      left: 24px;
      top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(26, 22, 20, 0.92);
      color: #fff;
      padding: 10px 16px 10px 12px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 11.5px;
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 30px -12px rgba(0, 0, 0, 0.35);
    }

    .hero-delivery-chip .material-symbols-outlined {
      font-size: 18px;
      color: #C5A880;
      background: rgba(197, 168, 128, 0.18);
      width: 28px;
      height: 28px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .hero-delivery-chip>div {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }

    .hero-delivery-chip b {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 13.5px;
      color: #fff;
    }

    .hero-delivery-chip span {
      font-size: 10.5px;
      color: rgba(255, 255, 255, 0.65);
    }

    /* ===== Promo banner ================================================ */
    .promo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #1A1614;
      color: #fff;
      border-radius: 24px;
      overflow: hidden;
      min-height: 280px;
    }

    .promo-copy {
      padding: 56px 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .promo-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: max-content;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #C5A880;
      padding: 6px 14px;
      border-radius: 9999px;
      background: rgba(197, 168, 128, 0.12);
      margin-bottom: 18px;
    }

    .promo-headline {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 48px;
      line-height: 1.06;
      letter-spacing: -0.022em;
      margin-bottom: 28px;
    }

    .promo-headline em {
      font-style: italic;
      font-weight: 400;
      color: #C5A880;
    }

    .promo-photo {
      position: relative;
      overflow: hidden;
      min-height: 200px;
    }

    .promo-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .promo-photo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #1A1614 0%, rgba(26, 22, 20, 0.7) 14%, transparent 40%);
    }

    /* ===== Testimonials — editorial strip ============================= */
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      margin-top: 52px;
      background: rgba(197, 168, 128, 0.07);
      border-radius: 24px;
      padding: 48px 40px;
    }

    .testimonial {
      padding: 0 44px 0 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .testimonial + .testimonial {
      padding: 0 44px 0 44px;
    }

    .testimonial + .testimonial + .testimonial {
      padding: 0 0 0 44px;
    }

    /* Thin vertical divider */
    .testimonial + .testimonial::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(197, 168, 128, 0.35);
    }

    /* Large gold opening quotation mark */
    .testimonial .quote-mark {
      font-family: 'Crimson Pro', serif;
      font-size: 56px;
      line-height: 0.9;
      color: #B89657;
      margin-bottom: 12px;
      opacity: 0.55;
      user-select: none;
    }

    .testimonial .quote {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 18px;
      line-height: 1.7;
      color: #1A1A1A;
      flex: 1;
    }

    .testimonial .head-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(197, 168, 128, 0.30);
    }

    .testimonial .avatar {
      width: 36px;
      height: 36px;
      border-radius: 9999px;
      background: #E8D9BE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      color: #6B4F1F;
      font-size: 15px;
      flex-shrink: 0;
    }

    .testimonial .name {
      font-weight: 600;
      font-size: 12.5px;
      color: #1A1A1A;
      letter-spacing: .02em;
    }

    .testimonial .stars {
      color: #B89657;
      font-size: 10px;
      letter-spacing: .16em;
      margin-top: 2px;
    }

    /* Mobile: horizontal swipe carousel */
    @media (max-width: 768px) {
      .testimonials-grid {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 16px;
        padding: 32px 20px;
        margin-top: 32px;
        background: transparent;
        border-radius: 0;
        margin-left: -20px;
        margin-right: -20px;
      }

      .testimonials-grid::-webkit-scrollbar { display: none; }

      /* Each testimonial is a standalone card on mobile */
      .testimonial,
      .testimonial + .testimonial,
      .testimonial + .testimonial + .testimonial {
        flex: 0 0 82%;
        scroll-snap-align: start;
        padding: 28px 24px !important;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 28px -8px rgba(60, 40, 15, 0.12);
      }

      /* Remove vertical divider — each is its own card */
      .testimonial + .testimonial::before { display: none; }

      .testimonial .quote { font-size: 16.5px; }
      .testimonial .quote-mark { font-size: 48px; }
    }

    /* ===== Instagram grid ============================================= */
    .ig-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
    }

    .ig-tile {
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      background: #ECE0C7;
      position: relative;
      cursor: pointer;
    }

    .ig-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 600ms ease;
    }

    .ig-tile:hover img {
      transform: scale(1.08);
    }

    .ig-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0, 0, 0, 0.30));
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .ig-tile:hover::after {
      opacity: 1;
    }

    /* ===== Newsletter ================================================= */
    .newsletter {
      background: linear-gradient(135deg, #F5EEDF 0%, #E8DAB8 100%);
      border-radius: 24px;
      padding: 48px;
      margin: 80px auto 60px;
      max-width: 1240px;
      display: grid;
      grid-template-columns: 1.4fr auto;
      gap: 32px;
      align-items: center;
    }

    .newsletter h3 {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 32px;
      letter-spacing: -0.015em;
      margin: 0;
    }

    .newsletter p {
      font-size: 14px;
      color: #5E5B59;
      margin: 6px 0 0;
    }

    .newsletter-form {
      display: flex;
      gap: 10px;
      min-width: 420px;
    }

    .newsletter-input {
      background: #fff;
      border: 1px solid rgba(26, 26, 26, 0.10);
      padding: 14px 22px;
      flex: 1;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      color: #1A1A1A;
      outline: none;
    }

    .newsletter-input::placeholder {
      color: rgba(26, 26, 26, 0.30);
    }

    .newsletter-input:focus {
      border-color: #B89657;
    }

    /* ===== Footer ===================================================== */
    .footer {
      background: #1A1614;
      color: rgba(255, 255, 255, 0.7);
      padding: 64px 0 24px;
    }

    .footer h4 {
      font-family: 'Jost', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      color: rgba(255,255,255,0.90);
      letter-spacing: .15em;
      text-transform: uppercase;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(197,168,128,0.18);
      margin-bottom: 18px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr 1fr 1.2fr;
      gap: 40px;
    }

    .footer-col ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .footer-col a {
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.62);
      letter-spacing: 0.01em;
      transition: color 200ms ease, transform 200ms ease;
    }

    .footer-col a:hover {
      color: #C5A880;
    }

    .footer-col .info-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 13px;
    }

    .footer-col .info-line .material-symbols-outlined {
      color: #C5A880;
      font-size: 17px;
    }

    .footer-socials {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .footer-socials a {
      width: 38px;
      height: 38px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.65);
      transition: all 220ms ease;
    }

    .footer-socials a:hover {
      background: #C5A880;
      color: #1A1A1A;
    }

    /* Policy strip — hidden on desktop, shown on mobile */
    .footer-policy-strip { display: none; }

    .footer-pay {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .footer-pay span {
      font-size: 10px;
      font-weight: 700;
      padding: 5px 9px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.65);
    }

    .footer-bottom {
      margin-top: 48px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-bottom .links {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
    }

    /* ===== Animations ================================================= */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Pre-hide only the photo so the image doesn't flash — text/CTAs left visible
       so they always show even if GSAP fails or timing is off */
    .hero-photo {
      opacity: 0;
    }

    /* ===== WA float =================================================== */
    @keyframes wa-pulse {

      0%,
      100% {
        box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
      }

      50% {
        box-shadow: 0 4px 32px rgba(37, 211, 102, 0.75), 0 0 0 8px rgba(37, 211, 102, 0.10);
      }
    }

    .wa-float {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 80;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #25D366;
      color: #fff;
      height: 54px;
      padding: 0 22px 0 18px;
      border-radius: 9999px;
      animation: wa-pulse 2.5s ease-in-out infinite;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }

    .wa-float:hover {
      animation: none;
    }

    .wa-float svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ===== Toast ====================================================== */
    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      z-index: 100;
      background: #1A1A1A;
      color: #fff;
      padding: 14px 24px;
      border-radius: 9999px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 18px 36px -16px rgba(0, 0, 0, 0.4);
      transition: all 320ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .toast--in {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast--out {
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
    }

    /* ===== Why KGS ==================================================== */
    .why-section {
      background: linear-gradient(180deg, #F2E8D6 0%, #ECE0C7 100%);
      border-radius: 32px;
      margin: 24px 32px;
      padding: 72px 0;
    }

    .why-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 44px;
    }

    .why-head .label-tag {
      margin-bottom: 18px;
    }

    .why-head h2 {
      font-size: 40px;
      line-height: 1.08;
      max-width: 640px;
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .why-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 28px 24px 26px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 12px 30px -16px rgba(60, 40, 15, 0.12);
      position: relative;
      transition: all 280ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .why-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px -20px rgba(60, 40, 15, 0.18);
    }

    .why-num {
      position: absolute;
      top: 22px;
      right: 24px;
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 14px;
      color: rgba(184, 150, 87, 0.65);
    }

    .why-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #1A1A1A;
      color: #C5A880;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
    }

    .why-icon .material-symbols-outlined {
      font-size: 24px;
      font-variation-settings: 'wght' 300;
    }

    .why-h {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 19px;
      line-height: 1.2;
      color: #1A1A1A;
      letter-spacing: -0.012em;
      margin-bottom: 8px;
    }

    .why-s {
      font-size: 13px;
      line-height: 1.65;
      color: #5E5B59;
    }

    /* ===== Complete the Look bundle ================================== */
    .bundle {
      display: grid;
      grid-template-columns: 0.95fr 1fr;
      background: #1A1614;
      border-radius: 24px;
      overflow: hidden;
      min-height: 420px;
      color: #fff;
    }

    .bundle-photo {
      position: relative;
      overflow: hidden;
    }

    .bundle-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.95) brightness(0.95);
    }

    .bundle-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 60%, rgba(26, 22, 20, 0.7) 100%);
    }

    .bundle-photo-tag {
      position: absolute;
      left: 22px;
      bottom: 22px;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      padding: 7px 14px;
      border-radius: 9999px;
    }

    .bundle-body {
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: #1A1A1A;
      background: #fff;
    }

    .bundle h2 {
      color: #1A1A1A;
    }

    .bundle p {
      color: #5E5B59;
    }

    .bundle-items {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 24px;
      flex-wrap: wrap;
    }

    .bundle-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #F3EBDC;
      border: 1px solid rgba(184, 150, 87, 0.25);
      border-radius: 14px;
      padding: 10px 14px 10px 10px;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      position: relative;
      transition: all 240ms ease;
    }

    .bundle-item:hover {
      background: #ECE0C7;
      transform: translateY(-2px);
    }

    .bundle-item img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: contain;
      background: #fff;
      padding: 4px;
    }

    .bundle-item__name {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 13px;
      color: #1A1A1A;
      letter-spacing: -0.005em;
      max-width: 130px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bundle-item__price {
      font-size: 11.5px;
      color: #5E5B59;
      margin-top: 1px;
    }

    .bundle-plus {
      font-family: 'Crimson Pro', serif;
      font-weight: 400;
      font-size: 24px;
      color: #B89657;
      margin: 0 4px 0 14px;
    }

    .bundle-cta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 20px;
      border-top: 1px solid rgba(184, 150, 87, 0.20);
    }

    .bundle-price {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bundle-price__strike {
      font-size: 13px;
      color: #5E5B59;
      text-decoration: line-through;
    }

    .bundle-price__now {
      font-family: 'Crimson Pro', serif;
      font-weight: 500;
      font-size: 28px;
      color: #1A1A1A;
      letter-spacing: -0.01em;
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
    }

    .bundle-price__now span {
      font-family: 'Jost', sans-serif;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #B89657;
    }

    .bundle-price__save {
      font-size: 11px;
      font-weight: 600;
      color: #C97840;
      letter-spacing: .04em;
      margin-top: 2px;
    }

    /* ===== PDP — stock bar, trust strip, sticky bar ================== */
    .pdp-stock {
      background: rgba(201, 120, 64, 0.06);
      border: 1px solid rgba(201, 120, 64, 0.22);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 22px;
    }

    .pdp-stock__bar {
      height: 6px;
      background: rgba(201, 120, 64, 0.12);
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .pdp-stock__bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #C97840, #A8612D);
      border-radius: 9999px;
      transition: width 600ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .pdp-stock__text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      color: #5E5B59;
    }

    .pdp-stock__text b {
      color: #A8612D;
      font-weight: 600;
    }

    .pdp-stock__text .material-symbols-outlined {
      color: #C97840;
      font-size: 16px;
    }

    .pdp-trust {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px;
      background: #FAF8F4;
      border: 1px solid rgba(197, 168, 128, 0.20);
      border-radius: 14px;
    }

    .pdp-trust__item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .pdp-trust__item .material-symbols-outlined {
      color: #B89657;
      font-size: 22px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .pdp-trust__item b {
      display: block;
      font-size: 12.5px;
      color: #1A1A1A;
      font-weight: 600;
    }

    .pdp-trust__item span {
      font-size: 11.5px;
      color: #5E5B59;
    }

    .pdp-sticky {
      display: none !important;
    }

    .pdp-sticky-hidden {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(26, 26, 26, 0.06);
      padding: 12px 0;
      z-index: 70;
      box-shadow: 0 -16px 32px -16px rgba(60, 40, 15, 0.18);
    }

    .pdp-sticky .btn {
      padding: 12px 20px;
      font-size: 12.5px;
    }

    /* ===== Cart ====================================================== */
    .cart-progress {
      background: #fff;
      border: 1px solid rgba(184, 150, 87, 0.25);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .cart-progress__head {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      color: #5E5B59;
      margin-bottom: 12px;
    }

    .cart-progress__head b {
      color: #1A1A1A;
      font-weight: 600;
    }

    .cart-progress__head .material-symbols-outlined {
      font-size: 18px;
    }

    .cart-progress__bar {
      height: 7px;
      background: rgba(184, 150, 87, 0.15);
      border-radius: 9999px;
      overflow: hidden;
    }

    .cart-progress__bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #B89657 0%, #25D366 100%);
      border-radius: 9999px;
      transition: width 700ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .cart-badges {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .cart-badges>div {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid rgba(184, 150, 87, 0.20);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #1A1A1A;
    }

    .cart-badges .material-symbols-outlined {
      color: #B89657;
      font-size: 17px;
    }

    .shop-filters-track {
      display: flex;
      gap: 12px;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .shop-filters-track::-webkit-scrollbar {
      display: none;
    }

    .cart-wrap {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 36px;
      align-items: flex-start;
    }

    /* Sticky bottom CTA — mobile cart */
    .cart-mobile-cta {
      display: none;
    }

    @media (max-width: 768px) {
      .cart-mobile-cta {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 14px 20px;
        padding-bottom: calc(14px + env(safe-area-inset-bottom));
        background: rgba(253, 250, 245, 0.97);
        backdrop-filter: blur(20px) saturate(180%);
        border-top: 1px solid rgba(197, 168, 128, 0.28);
        z-index: 90;
        box-shadow: 0 -8px 32px -8px rgba(0, 0, 0, 0.10);
        gap: 16px;
        align-items: center;
      }

      .cart-mobile-cta__info {
        flex: 1;
        min-width: 0;
      }

      .cart-mobile-cta__label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: .2em;
        text-transform: uppercase;
        color: #5E5B59;
        line-height: 1;
        margin-bottom: 3px;
      }

      .cart-mobile-cta__total {
        font-family: 'Crimson Pro', serif;
        font-size: 22px;
        font-weight: 500;
        color: #1A1A1A;
        line-height: 1;
      }

      .cart-mobile-cta__btn {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #1A1A1A;
        color: #fff;
        border: none;
        border-radius: 9999px;
        padding: 14px 24px;
        font-family: 'Jost', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: .02em;
        cursor: pointer;
        transition: background 250ms ease, transform 200ms ease;
        white-space: nowrap;
      }

      .cart-mobile-cta__btn:active {
        background: #2A2A2A;
        transform: scale(0.97);
      }

      /* Push cart section content up so sticky bar doesn't cover it */
      .cart-section-bottom {
        padding-bottom: 100px !important;
      }
    }

    .cart-item-row {
      display: grid;
      grid-template-columns: 104px 1fr auto;
      gap: 20px;
      padding: 20px;
      align-items: center;
    }

    .pdp-sticky-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .pdp-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 64px;
    }

    /* ===== Checkout & Order Confirmation ============================= */
    .checkout-wrap {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 40px;
      align-items: flex-start;
    }

    .checkout-form-section {
      background: #fff;
      border: 1px solid rgba(197, 168, 128, 0.25);
      border-radius: 18px;
      padding: 32px;
    }

    .checkout-form-section h3 {
      font-family: 'Crimson Pro', serif;
      font-size: 22px;
      margin-bottom: 24px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
    }

    .form-field label {
      font-family: 'Jost', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #5E5B59;
    }

    .form-input {
      padding: 12px 18px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      color: #1A1A1A;
      background: #FAFAF8;
      border: 1px solid rgba(197, 168, 128, 0.35);
      border-radius: 10px;
      outline: none;
      transition: border-color 200ms;
    }

    .form-input:focus {
      border-color: #B89657;
      background: #fff;
    }

    .form-input::placeholder {
      color: rgba(26, 26, 26, 0.30);
    }

    .payment-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1.5px solid rgba(197, 168, 128, 0.30);
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 200ms ease;
    }

    .payment-option.selected {
      border-color: #1A1A1A;
      background: #FAF8F4;
    }

    .payment-option input[type="radio"] {
      accent-color: #1A1A1A;
      width: 16px;
      height: 16px;
    }

    .payment-option-label {
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #1A1A1A;
    }

    .payment-option-sub {
      font-size: 11.5px;
      color: #5E5B59;
      margin-top: 2px;
    }

    .checkout-summary {
      background: #fff;
      border: 1px solid rgba(197, 168, 128, 0.25);
      border-radius: 18px;
      padding: 28px;
      position: sticky;
      top: 96px;
    }

    .checkout-summary h3 {
      font-family: 'Crimson Pro', serif;
      font-size: 20px;
      margin-bottom: 18px;
    }

    .checkout-trust {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      padding: 12px;
      background: #FAF8F4;
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      color: #5E5B59;
    }

    .checkout-trust .material-symbols-outlined {
      font-size: 15px;
      color: #B89657;
    }

    /* Order confirmation */
    .order-confirm-wrap {
      max-width: 640px;
      margin: 0 auto;
      text-align: center;
      padding: 80px 24px;
    }

    .order-confirm-icon {
      font-size: 72px;
      color: #B89657;
      font-variation-settings: 'FILL' 1, 'wght' 300;
      margin-bottom: 24px;
      display: block;
    }

    .order-confirm-wrap h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 2.6rem;
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .order-num {
      display: inline-block;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      padding: 8px 20px;
      background: rgba(184, 150, 87, 0.12);
      border-radius: 9999px;
      color: #8E7449;
      margin-bottom: 20px;
    }

    /* Wishlist page */
    .wishlist-empty {
      text-align: center;
      padding: 80px 24px;
    }

    .wishlist-empty .material-symbols-outlined {
      font-size: 52px;
      color: #C5A880;
      margin-bottom: 16px;
      display: block;
    }

    .wishlist-empty h3 {
      font-family: 'Crimson Pro', serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .wishlist-empty p {
      color: #5E5B59;
      max-width: 380px;
      margin: 0 auto 24px;
    }

    /* ===== Page top padding (sticky nav) ============================= */
    .page-body {
      padding-top: 0;
    }

    /* ===== Responsive — Tablet 1024px =============================== */
    @media (max-width: 1024px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
        margin: 12px 16px 0;
      }

      .hero-photo {
        height: 340px;
      }

      .hero-photo img {
        height: 100%;
        object-fit: cover;
      }

      .hero-copy {
        padding: 56px 40px 40px;
      }

      .hero-slides-indicator {
        display: none;
      }

      .footer-grid {
        grid-template-columns: 1.5fr 1fr 1fr;
        gap: 28px;
      }

      .why-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .bundle {
        grid-template-columns: 1fr;
      }

      .bundle-photo {
        height: 260px;
      }

      .checkout-wrap {
        grid-template-columns: 1fr;
      }

      .checkout-summary {
        position: static;
      }
    }

    /* ===== Responsive — Mobile 768px ================================ */
    @media (max-width: 768px) {
      .container {
        padding: 0 18px;
      }

      .announce-side {
        display: none;
      }

      .announce-bar {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .announce-center {
        min-width: auto;
        width: 100%;
      }

      .nav-links {
        display: none;
      }

      .hamburger-btn {
        display: inline-flex;
      }

      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 16px;
      }

      /* Top nav → static brand header on mobile (scrolls away) */
      .nav-wrap,
      .nav-wrap.nav--scrolled {
        position: static;
        top: auto;
        padding: 0;
        transform: none !important;
      }
      .nav-bar {
        border-radius: 0;
        height: 56px;
        padding: 0 20px;
        max-width: 100%;
        margin: 0;
        border: none;
        border-bottom: 1px solid rgba(197, 168, 128, 0.22);
        background: #FAF8F4;
        backdrop-filter: none;
        box-shadow: none;
      }
      .nav-wrap.nav--scrolled .nav-bar {
        border-radius: 0;
        height: 56px;
        padding: 0 20px;
        background: #FAF8F4;
        backdrop-filter: none;
        box-shadow: none;
        border-bottom: 1px solid rgba(197, 168, 128, 0.22);
      }
      .nav-actions .icon-btn { display: none; }
      .nav-progress { display: none; }

      /* ── About page mobile fixes ── */
      .about-hero-section { padding: 52px 0 44px !important; }
      .about-hero-section h1 { font-size: 2rem !important; line-height: 1.12 !important; }
      .about-hero-section p  { font-size: 13.5px !important; }
      .about-story-grid {
        grid-template-columns: 1fr !important;
        gap: 28px !important;
      }
      .about-story-img {
        aspect-ratio: 3/2 !important;
      }
      .about-stats-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
      }
      .wishlist-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
      }
      .contact-grid {
        grid-template-columns: 1fr !important;
        gap: 32px !important;
      }
      .about-stat-card {
        padding: 20px 16px !important;
        border-radius: 14px !important;
      }
      .about-stat-card > div:first-child {
        font-size: 1.8rem !important;
        margin-bottom: 4px !important;
      }
      .about-stat-card > div:nth-child(2) {
        font-size: 11.5px !important;
        margin-bottom: 4px !important;
      }
      .about-stat-card > div:last-child {
        font-size: 11px !important;
        line-height: 1.5 !important;
      }

      /* ── Mobile hero: full-screen editorial overlay ── */
      .hero {
        margin: 12px 12px 0;
        border-radius: 28px;
        min-height: calc(100svh - 80px);
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        position: relative;
        overflow: hidden;
        background: #1A1614;
      }

      /* Image floods the entire hero */
      .hero-photo {
        position: absolute;
        inset: 0;
        height: 100%;
        width: 100%;
        z-index: 0;
      }

      .hero-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 20%;
        filter: saturate(0.88) brightness(0.92);
      }

      /* Gradient: dark at bottom for text, light at top */
      .hero-photo::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(12, 10, 8, 0.92) 0%,
          rgba(12, 10, 8, 0.55) 40%,
          rgba(12, 10, 8, 0.10) 100%
        );
        z-index: 1;
      }

      /* Text anchored to bottom */
      .hero-copy {
        position: relative;
        z-index: 2;
        margin-top: auto;
        padding: 0 24px 36px;
        justify-content: flex-end;
      }

      .hero h1 {
        color: #fff;
        font-size: clamp(2rem, 7vw, 2.6rem);
        margin-bottom: 10px;
      }

      .hero h1 em { color: #C5A880; }

      .hero-eyebrow {
        background: rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-color: rgba(255, 255, 255, 0.16);
        color: #C5A880;
        margin-bottom: 16px;
      }

      .hero-sub {
        color: rgba(255, 255, 255, 0.68);
        font-size: 13.5px;
        margin-bottom: 24px;
      }

      /* Single CTA — full width white pill */
      .hero-ctas {
        flex-direction: column;
        margin-bottom: 0;
        gap: 0;
      }

      .hero-ctas .btn-dark {
        width: 100%;
        justify-content: center;
        background: #fff;
        color: #1A1A1A;
        border-color: #fff;
        padding: 16px 24px;
        font-size: 13.5px;
      }

      .hero-ctas .btn-ghost { display: none; }

      /* Hide elements that clutter the overlay */
      .hero-stats,
      .hero-arrows,
      .hero-floating-chip,
      .hero-delivery-chip,
      .hero-slides-indicator { display: none; }

      /* Override tablet photo height */
      .hero-photo { height: auto; }

      .trust-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .section {
        padding: 48px 0;
      }

      .section-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .ig-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .newsletter {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 32px 24px;
      }

      .newsletter-form {
        min-width: auto;
        flex-direction: column;
      }

      .newsletter-input {
        width: 100%;
      }

      .newsletter-form .btn {
        width: 100%;
      }

      .why-section {
        margin: 12px 12px;
        border-radius: 20px;
      }

      .why-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      /* ── Mobile footer: brand + contact only ──────────────────────── */
      .footer { padding: 44px 0 108px; }
      /* Task-flow pages: no footer needed */
      [data-route="cart"] .footer,
      [data-route="checkout"] .footer,
      [data-route="order-confirmation"] .footer,
      [data-route="login"] .footer,
      [data-route="register"] .footer { display: none; }

      .footer-grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      /* Hide nav link columns — users have bottom nav bar */
      .footer-col:nth-child(2),
      .footer-col:nth-child(3),
      .footer-col:nth-child(4) { display: none; }

      /* Logo col: centre-aligned on mobile */
      .footer-col:first-child {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding-bottom: 28px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      .footer-col:first-child p,
      .footer-col:first-child > div:first-of-type { text-align: center; }

      .footer-socials { justify-content: center; }

      /* Hide newsletter on mobile — keep footer compact */
      .footer-col:first-child > div:last-child { display: none; }

      /* Contact col: compact, below brand block */
      .footer-col:last-child {
        padding-top: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .footer-col:last-child ul { align-items: center; }
      .footer-col:last-child h4 { text-align: center; }
      .footer-pay { justify-content: center; }

      /* Policy strip — mobile only */
      .footer-policy-strip {
        display: block;
        margin-top: 32px;
        padding: 24px 0;
        border-top: 1px solid rgba(255,255,255,0.07);
        border-bottom: 1px solid rgba(255,255,255,0.07);
        text-align: center;
      }
      .footer-policy-strip__label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
        margin-bottom: 16px;
      }
      .footer-policy-strip__grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 16px;
      }
      .footer-policy-strip__grid a {
        font-size: 13px;
        color: rgba(255,255,255,0.65);
        font-family: 'Jost', sans-serif;
        padding: 10px 14px;
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        transition: background 200ms ease, color 200ms ease;
        text-align: center;
      }
      .footer-policy-strip__grid a:hover,
      .footer-policy-strip__grid a:active {
        background: rgba(197,168,128,0.12);
        color: #C5A880;
      }

      /* Footer bottom: centred, links more visible on mobile */
      .footer-bottom {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 18px;
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      .footer-bottom .links {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px 20px;
      }
