<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | KGS Home Décors</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
  <link rel="stylesheet" href="assets/css/icons.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .auth-input { padding: 14px 16px; border: 1px solid rgba(197,168,128,0.40); border-radius: 8px; font-family: 'Jost', sans-serif; font-size: 14px; background: #fff; width: 100%; box-sizing: border-box; transition: border-color 200ms, box-shadow 200ms; }
    .auth-input:focus { outline: none; border-color: #B89657; box-shadow: 0 0 0 3px rgba(184,150,87,0.12); }
    .auth-input.error { border-color: #D32F2F; box-shadow: 0 0 0 3px rgba(211,47,47,0.08); }
    .auth-label { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; text-align: left; }
    .auth-label > span { font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: #1A1A1A; }
    .field-wrap { position: relative; }
    .field-wrap .auth-input { padding-right: 46px; }
    .eye-btn { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9E9B98; padding: 4px; display: flex; align-items: center; transition: color 200ms; }
    .eye-btn:hover { color: #1A1A1A; }
    .eye-btn .material-symbols-outlined { font-size: 18px; }
    .strength-wrap { margin-top: 8px; }
    .strength-bars { display: flex; gap: 4px; margin-bottom: 6px; }
    .strength-bar { flex: 1; height: 3px; background: rgba(197,168,128,0.2); border-radius: 9999px; transition: background 300ms; }
    .strength-bar.s1 { background: #D32F2F; }
    .strength-bar.s2 { background: #F57C00; }
    .strength-bar.s3 { background: #388E3C; }
    .strength-bar.s4 { background: #1B5E20; }
    .strength-label { font-size: 11px; color: #5E5B59; }
    .err-msg { display: none; align-items: center; gap: 8px; background: rgba(211,47,47,0.06); border: 1px solid rgba(211,47,47,0.20); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #C62828; margin-bottom: 20px; text-align: left; }
    .err-msg.show { display: flex; }
    .invalid-screen { display: none; text-align: center; }
    .invalid-screen.show { display: block; }
    .form-screen.hide { display: none; }
  </style>
</head>
<body style="background: #FAF8F4; display: flex; flex-direction: column; min-height: 100vh;">

<div class="nav-wrap">
  <div class="nav-bar container">
    <a href="index.html" class="logo">
      <span class="mark">KGS</span>
      <span class="sub">Home Décors</span>
    </a>
    <nav class="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="product-listing.html">Shop</a>
      <a class="nav-link" href="index.html#about">Our Story</a>
      <a class="nav-link" href="index.html#contact">Contact</a>
    </nav>
    <div class="nav-actions">
      <a class="icon-btn" href="account.html" aria-label="Account"><span class="material-symbols-outlined">person</span></a>
      <a class="icon-btn" href="index.html" aria-label="Cart"><span class="material-symbols-outlined">shopping_bag</span></a>
    </div>
  </div>
</div>

<main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px;">
  <div style="width: 100%; max-width: 440px; padding: 48px; background: #fff; border: 1px solid rgba(197,168,128,0.25); border-radius: 16px; text-align: center; box-shadow: 0 12px 48px -12px rgba(0,0,0,0.06);">

    <!-- Invalid / expired link screen -->
    <div class="invalid-screen" id="invalid-screen">
      <div style="width: 52px; height: 52px; background: rgba(211,47,47,0.08); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
        <span class="material-symbols-outlined" style="font-size: 24px; color: #C62828;">link_off</span>
      </div>
      <h2 style="font-family:'Crimson Pro',serif; font-size: 26px; font-weight: 500; margin-bottom: 10px;">Link Expired</h2>
      <p style="font-size: 13.5px; color: #5E5B59; line-height: 1.7; margin-bottom: 28px;">This password reset link has expired or is invalid. Please request a new one.</p>
      <a href="forgot-password.html" class="btn btn-dark" style="display: block; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-size: 14px;">Request New Link</a>
      <a href="account-login.html" style="font-size: 13px; color: #5E5B59;">Back to Sign In</a>
    </div>

    <!-- Password update form -->
    <div class="form-screen" id="form-screen" style="display:none;">
      <div style="width: 52px; height: 52px; background: rgba(184,150,87,0.10); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
        <span class="material-symbols-outlined" style="font-size: 24px; color: #B89657;">lock</span>
      </div>
      <h1 style="font-family:'Crimson Pro',serif; font-size: 30px; font-weight: 500; margin-bottom: 6px; letter-spacing: -0.01em;">Set New Password</h1>
      <p style="font-size: 13.5px; color: #5E5B59; margin-bottom: 32px; line-height: 1.6;">Choose a strong password for your KGS account.</p>

      <div class="err-msg" id="err-msg">
        <span class="material-symbols-outlined" style="font-size:17px; flex-shrink:0;">error</span>
        <span id="err-text"></span>
      </div>

      <form id="update-form" novalidate>
        <label class="auth-label">
          <span>New Password</span>
          <div class="field-wrap">
            <input type="password" id="password" class="auth-input" placeholder="••••••••" autocomplete="new-password" required>
            <button type="button" class="eye-btn" onclick="toggleEye('password',this)" aria-label="Show password">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
          <div class="strength-wrap" id="strength-wrap" style="display:none;">
            <div class="strength-bars">
              <div class="strength-bar" id="sb1"></div>
              <div class="strength-bar" id="sb2"></div>
              <div class="strength-bar" id="sb3"></div>
              <div class="strength-bar" id="sb4"></div>
            </div>
            <div class="strength-label" id="strength-label">Weak</div>
          </div>
        </label>

        <label class="auth-label">
          <span>Confirm New Password</span>
          <div class="field-wrap">
            <input type="password" id="confirm-password" class="auth-input" placeholder="••••••••" autocomplete="new-password" required>
            <button type="button" class="eye-btn" onclick="toggleEye('confirm-password',this)" aria-label="Show password">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </label>

        <button type="submit" id="submit-btn" class="btn btn-dark" style="width: 100%; margin-top: 4px; font-size: 14px; letter-spacing: .03em;">
          Update Password
        </button>
      </form>
    </div>

  </div>
</main>

<script src="assets/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  const hidden = inp.type === 'password';
  inp.type = hidden ? 'text' : 'password';
  btn.querySelector('.material-symbols-outlined').textContent = hidden ? 'visibility_off' : 'visibility';
  btn.setAttribute('aria-label', hidden ? 'Hide password' : 'Show password');
}

function showErr(msg) {
  const box = document.getElementById('err-msg');
  document.getElementById('err-text').textContent = msg;
  box.classList.add('show');
}
function clearErr() { document.getElementById('err-msg').classList.remove('show'); }

function calcStrength(pwd) {
  let score = 0;
  if (pwd.length >= 8) score++;
  if (/\d/.test(pwd)) score++;
  if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
  if (/[^a-zA-Z0-9]/.test(pwd)) score++;
  return score;
}

const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
const barClass = ['', 's1', 's2', 's3', 's4'];

document.getElementById('password').addEventListener('input', function() {
  const pwd = this.value;
  const wrap = document.getElementById('strength-wrap');
  if (!pwd) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const score = calcStrength(pwd);
  for (let i = 1; i <= 4; i++) {
    const bar = document.getElementById('sb' + i);
    bar.className = 'strength-bar' + (i <= score ? ' ' + barClass[score] : '');
  }
  document.getElementById('strength-label').textContent = labels[score] || 'Weak';
});

// Supabase sends the recovery token via URL hash — onAuthStateChange fires with SIGNED_IN + recovery event
(async () => {
  const sb = getSupabase();

  // Listen for the PASSWORD_RECOVERY event from the email link
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      document.getElementById('form-screen').style.display = 'block';
    }
  });

  // If already has session from a recovery link (page reload), show form
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    document.getElementById('form-screen').style.display = 'block';
  } else {
    // No session and no recovery event yet — show invalid/expired after short delay
    setTimeout(() => {
      if (document.getElementById('form-screen').style.display !== 'block') {
        document.getElementById('invalid-screen').classList.add('show');
      }
    }, 1500);
  }
})();

document.getElementById('update-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErr();

  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm-password').value;
  const btn = document.getElementById('submit-btn');

  if (password.length < 8) { showErr('Password must be at least 8 characters.'); return; }
  if (calcStrength(password) < 2) { showErr('Password is too weak. Add numbers or uppercase letters.'); return; }
  if (password !== confirm) {
    showErr('Passwords do not match. Please check and try again.');
    document.getElementById('confirm-password').classList.add('error');
    return;
  }
  document.getElementById('confirm-password').classList.remove('error');

  btn.textContent = 'Updating…';
  btn.disabled = true;

  try {
    await updateAuthPassword(password);
    window.location.replace('account-login.html?msg=password-updated');
  } catch (err) {
    const msg = (err.message || '').toLowerCase();
    if (msg.includes('weak') || msg.includes('should')) {
      showErr('Password is too weak. Use at least 8 characters with letters and numbers.');
    } else if (msg.includes('expired') || msg.includes('invalid')) {
      showErr('Your reset link has expired. Please request a new one.');
    } else {
      showErr('Failed to update password. Please try again.');
    }
    btn.textContent = 'Update Password';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
