<!DOCTYPE html>
<html lang="en">

<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{overflow-x:hidden;width:100%;margin:0;padding:0;}
body{-webkit-font-smoothing:antialiased;}
::selection{background:#C5A880;color:#fff;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;}
#page-preloader{position:fixed;inset:0;z-index:9999;background:#FAF8F4;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease,visibility .5s ease;}
#page-preloader .pl-logo{font-family:'Crimson Pro',serif;font-size:2rem;font-weight:500;letter-spacing:.35em;color:#1A1A1A;opacity:0;animation:plFadeIn .6s ease forwards .15s;}
@keyframes plFadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.form-input{width:100%;background:transparent;border:none;border-bottom:1px solid #E4DDD4;padding:14px 0 12px;font-family:'Jost',sans-serif;font-size:14px;color:#1A1A1A;outline:none;transition:border-color .25s;}
.form-input:focus{border-color:#1A1A1A;}
.form-input::placeholder{color:#767270;font-size:13px;}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px 24px;background:#1A1A1A;color:#FAF8F4;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;border:none;cursor:pointer;transition:background .25s,transform .2s;}
.btn-primary:hover{background:#C5A880;}
.rv{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.32,.72,0,1),transform .7s cubic-bezier(.32,.72,0,1);}
.rv.in{opacity:1;transform:translateY(0);}

/* Strength meter */
.strength-bar{height:3px;background:#E4DDD4;position:relative;overflow:hidden;}
.strength-fill{height:100%;width:0;transition:width .4s cubic-bezier(.32,.72,0,1),background .4s;}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search,person,favorite,shopping_bag,menu,close,call,chat,location_on,schedule,local_shipping,payments,replay,support_agent,star,shield,sentiment_satisfied,public,directions,check_circle,arrow_forward,arrow_back,check,receipt_long,verified,inventory_2,home,local_fire_department,storefront,add,remove,delete,edit,visibility,logout,history,edit_note,open_in_new,package_2,search_off,tune,sort,filter_list,grid_view,view_list,share,content_copy,check_box,check_box_outline_blank,radio_button_unchecked,radio_button_checked,expand_more,expand_less,chevron_right,chevron_left,info,warning,error,help,lock,lock_open,visibility_off,email,phone,location_searching&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search,person,favorite,shopping_bag,menu,close,call,chat,location_on,schedule,local_shipping,payments,replay,support_agent,star,shield,sentiment_satisfied,public,directions,check_circle,arrow_forward,arrow_back,check,receipt_long,verified,inventory_2,home,local_fire_department,storefront,add,remove,delete,edit,visibility,logout,history,edit_note,open_in_new,package_2,search_off,tune,sort,filter_list,grid_view,view_list,share,content_copy,check_box,check_box_outline_blank,radio_button_unchecked,radio_button_checked,expand_more,expand_less,chevron_right,chevron_left,info,warning,error,help,lock,lock_open,visibility_off,email,phone,location_searching&display=swap"></noscript>
<link rel="stylesheet" href="assets/css/tailwind.min.css">
</head>
<body class="bg-base text-ink font-sans min-h-[100dvh] flex flex-col">

<div id="page-preloader"><span class="pl-logo">KGS</span></div>

<div class="flex items-center justify-between px-6 py-5 border-b border-border">
  <a href="index.html" class="font-serif font-medium tracking-[.35em] text-[1.3rem] text-ink hover:text-gold transition-colors">KGS</a>
  <a href="account-login.html" class="text-muted text-[12px] font-medium hover:text-ink transition-colors flex items-center gap-1.5">
    <span class="material-symbols-outlined text-[16px]">arrow_back</span> Sign In
  </a>
</div>

<div class="flex-1 flex items-center justify-center px-6 py-16">
  <div class="w-full max-w-[380px]">

    <div class="rv w-14 h-14 border border-border flex items-center justify-center mb-8">
      <span class="material-symbols-outlined text-[28px] text-gold" style="font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;">shield_lock</span>
    </div>

    <div class="rv" style="transition-delay:.06s">
      <p class="text-[11px] font-semibold tracking-[.22em] uppercase text-gold mb-3">Almost There</p>
      <h1 class="font-serif font-medium text-ink mb-2" style="font-size:clamp(1.9rem,3vw,2.4rem);">Set New Password</h1>
      <p class="text-muted text-[13px] leading-[1.7] mb-10">Choose a strong new password for your KGS account. You'll be signed in automatically afterwards.</p>
    </div>

    <form id="update-form" class="space-y-7" novalidate>
      <div class="rv" style="transition-delay:.12s">
        <label class="block text-[10px] font-semibold tracking-[.18em] uppercase text-muted mb-2">New Password</label>
        <div class="relative">
          <input id="new-password" type="password" placeholder="Minimum 8 characters" class="form-input pr-10" autocomplete="new-password" required minlength="8" oninput="checkStrength(this.value)">
          <button type="button" id="toggle-pw1" class="absolute right-0 top-1/2 -translate-y-1/2 text-muted hover:text-ink transition-colors bg-transparent border-none cursor-pointer p-1">
            <span class="material-symbols-outlined text-[20px]" id="eye1">visibility</span>
          </button>
        </div>
        <!-- Strength meter -->
        <div class="strength-bar mt-2">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <p id="strength-text" class="text-[11px] text-muted mt-1.5"></p>
      </div>

      <div class="rv" style="transition-delay:.18s">
        <label class="block text-[10px] font-semibold tracking-[.18em] uppercase text-muted mb-2">Confirm Password</label>
        <div class="relative">
          <input id="confirm-password" type="password" placeholder="Repeat your password" class="form-input pr-10" autocomplete="new-password" required>
          <button type="button" id="toggle-pw2" class="absolute right-0 top-1/2 -translate-y-1/2 text-muted hover:text-ink transition-colors bg-transparent border-none cursor-pointer p-1">
            <span class="material-symbols-outlined text-[20px]" id="eye2">visibility</span>
          </button>
        </div>
      </div>

      <div id="update-error" class="hidden text-[12px] text-red-600 bg-red-50 border border-red-100 px-4 py-3"></div>
      <div id="update-success" class="hidden text-[12px] text-green-700 bg-green-50 border border-green-100 px-4 py-3"></div>

      <div class="rv" style="transition-delay:.24s">
        <button type="submit" id="update-btn" class="btn-primary">
          <span>Update Password</span>
          <span class="material-symbols-outlined text-[18px]">check</span>
        </button>
      </div>
    </form>
  </div>
</div>

<script src="assets/js/supabase-client.js" defer></script>
<script>
document.fonts.ready.then(() => {
  const pl = document.getElementById('page-preloader');
  if (pl) { pl.style.opacity = '0'; pl.style.visibility = 'hidden'; setTimeout(() => pl.remove(), 500); }
  document.querySelectorAll('.rv').forEach((el, i) => setTimeout(() => el.classList.add('in'), 80 + i * 70));
});

// Toggle passwords
function makePwToggle(btnId, inputId, eyeId) {
  document.getElementById(btnId).addEventListener('click', () => {
    const pw = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    pw.type = pw.type === 'password' ? 'text' : 'password';
    eye.textContent = pw.type === 'password' ? 'visibility' : 'visibility_off';
  });
}
makePwToggle('toggle-pw1', 'new-password', 'eye1');
makePwToggle('toggle-pw2', 'confirm-password', 'eye2');

// Password strength
function checkStrength(val) {
  const fill = document.getElementById('strength-fill');
  const text = document.getElementById('strength-text');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  const colors = ['', '#EF4444', '#F59E0B', '#3B82F6', '#22C55E'];
  const widths = ['0%', '25%', '50%', '75%', '100%'];
  fill.style.width = val.length ? widths[score] : '0%';
  fill.style.background = colors[score] || '#E4DDD4';
  text.textContent = val.length ? labels[score] : '';
  text.style.color = colors[score] || '#767270';
}

document.getElementById('update-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('update-btn');
  const errEl = document.getElementById('update-error');
  const sucEl = document.getElementById('update-success');
  const pw = document.getElementById('new-password').value;
  const cpw = document.getElementById('confirm-password').value;
  errEl.classList.add('hidden'); sucEl.classList.add('hidden');
  if (pw !== cpw) { errEl.textContent = 'Passwords do not match.'; errEl.classList.remove('hidden'); return; }
  if (pw.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.remove('hidden'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined text-[18px] animate-spin">refresh</span> Updating...';
  try {
    const { error } = await supabase.auth.updateUser({ password: pw });
    if (error) throw error;
    sucEl.textContent = 'Password updated! Redirecting to your account...';
    sucEl.classList.remove('hidden');
    btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">check</span> Done';
    setTimeout(() => window.location.href = 'account.html', 2000);
  } catch(err) {
    errEl.textContent = err.message || 'Update failed. Please request a new reset link.';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '<span>Update Password</span><span class="material-symbols-outlined text-[18px]">check</span>';
  }
});
</script>
</body>
</html>
