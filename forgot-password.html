<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { base:'#FAF8F4', tint:'#F3EDE4', surface:'#FDF9F3', ink:'#1A1A1A', muted:'#767270', gold:'#C5A880', warm:'#C97840', border:'#E4DDD4' },
    fontFamily: { sans: ['"Jost"', 'sans-serif'], serif: ['"Crimson Pro"', 'serif'] }
  }}
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{overflow-x:hidden;width:100%;margin:0;padding:0;}
body{-webkit-font-smoothing:antialiased;}
::selection{background:#C5A880;color:#fff;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;}
#page-preloader{position:fixed;inset:0;z-index:9999;background:#FAF8F4;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease,visibility .5s ease;}
#page-preloader .pl-logo{font-family:'Crimson Pro',serif;font-size:2rem;font-weight:500;letter-spacing:.35em;color:#1A1A1A;opacity:0;animation:plFadeIn .6s ease forwards .15s;}
@keyframes plFadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.form-input{width:100%;background:transparent;border:none;border-bottom:1px solid #E4DDD4;padding:14px 0 12px;font-family:'Jost',sans-serif;font-size:14px;color:#1A1A1A;outline:none;transition:border-color .25s;}
.form-input:focus{border-color:#1A1A1A;}
.form-input::placeholder{color:#767270;font-size:13px;}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px 24px;background:#1A1A1A;color:#FAF8F4;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;border:none;cursor:pointer;transition:background .25s,transform .2s;}
.btn-primary:hover{background:#C5A880;}

.rv{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.32,.72,0,1),transform .7s cubic-bezier(.32,.72,0,1);}
.rv.in{opacity:1;transform:translateY(0);}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search,person,favorite,shopping_bag,menu,close,call,chat,location_on,schedule,local_shipping,payments,replay,support_agent,star,shield,sentiment_satisfied,public,directions,check_circle,arrow_forward,arrow_back,check,receipt_long,verified,inventory_2,home,local_fire_department,storefront,add,remove,delete,edit,visibility,logout,history,edit_note,open_in_new,package_2,search_off,tune,sort,filter_list,grid_view,view_list,share,content_copy,check_box,check_box_outline_blank,radio_button_unchecked,radio_button_checked,expand_more,expand_less,chevron_right,chevron_left,info,warning,error,help,lock,lock_open,visibility_off,email,phone,location_searching&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search,person,favorite,shopping_bag,menu,close,call,chat,location_on,schedule,local_shipping,payments,replay,support_agent,star,shield,sentiment_satisfied,public,directions,check_circle,arrow_forward,arrow_back,check,receipt_long,verified,inventory_2,home,local_fire_department,storefront,add,remove,delete,edit,visibility,logout,history,edit_note,open_in_new,package_2,search_off,tune,sort,filter_list,grid_view,view_list,share,content_copy,check_box,check_box_outline_blank,radio_button_unchecked,radio_button_checked,expand_more,expand_less,chevron_right,chevron_left,info,warning,error,help,lock,lock_open,visibility_off,email,phone,location_searching&display=swap"></noscript>
</head>
<body class="bg-base text-ink font-sans min-h-[100dvh] flex flex-col">

<div id="page-preloader"><span class="pl-logo">KGS</span></div>

<!-- Minimal nav -->
<div class="flex items-center justify-between px-6 py-5 border-b border-border">
  <a href="index.html" class="font-serif font-medium tracking-[.35em] text-[1.3rem] text-ink hover:text-gold transition-colors">KGS</a>
  <a href="account-login.html" class="text-muted text-[12px] font-medium hover:text-ink transition-colors flex items-center gap-1.5">
    <span class="material-symbols-outlined text-[16px]">arrow_back</span> Back to Sign In
  </a>
</div>

<!-- Centered form -->
<div class="flex-1 flex items-center justify-center px-6 py-16">
  <div class="w-full max-w-[380px]">

    <!-- Icon -->
    <div class="rv w-14 h-14 border border-border flex items-center justify-center mb-8">
      <span class="material-symbols-outlined text-[28px] text-gold" style="font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;">lock_reset</span>
    </div>

    <div class="rv" style="transition-delay:.06s">
      <p class="text-[11px] font-semibold tracking-[.22em] uppercase text-gold mb-3">Account Recovery</p>
      <h1 class="font-serif font-medium text-ink mb-2" style="font-size:clamp(1.9rem,3vw,2.4rem);">Reset Password</h1>
      <p class="text-muted text-[13px] leading-[1.7] mb-10">Enter your email and we'll send a password reset link. Check your inbox within a minute.</p>
    </div>

    <form id="forgot-form" class="space-y-7" novalidate>
      <div class="rv" style="transition-delay:.12s">
        <label class="block text-[10px] font-semibold tracking-[.18em] uppercase text-muted mb-2">Email Address</label>
        <input id="forgot-email" type="email" placeholder="you@example.com" class="form-input" autocomplete="email" required>
      </div>

      <div id="forgot-error" class="hidden text-[12px] text-red-600 bg-red-50 border border-red-100 px-4 py-3"></div>
      <div id="forgot-success" class="hidden text-[12px] text-green-700 bg-green-50 border border-green-100 px-4 py-3"></div>

      <div class="rv" style="transition-delay:.18s">
        <button type="submit" id="forgot-btn" class="btn-primary">
          <span>Send Reset Link</span>
          <span class="material-symbols-outlined text-[18px]">send</span>
        </button>
      </div>
    </form>

    <!-- Divider -->
    <div class="mt-10 pt-8 border-t border-border rv" style="transition-delay:.24s">
      <p class="text-[12px] text-muted text-center">
        Remembered it? <a href="account-login.html" class="text-warm font-medium hover:text-ink transition-colors">Sign in</a>
        &nbsp;·&nbsp;
        Need help? <a href="https://wa.me/919789182921?text=Hi%20KGS%2C%20I%20need%20help%20resetting%20my%20password" target="_blank" class="text-warm font-medium hover:text-ink transition-colors">WhatsApp us</a>
      </p>
    </div>
  </div>
</div>

<script src="assets/js/supabase-client.js" defer></script>
<script>
document.fonts.ready.then(() => {
  const pl = document.getElementById('page-preloader');
  if (pl) { pl.style.opacity = '0'; pl.style.visibility = 'hidden'; setTimeout(() => pl.remove(), 500); }
  document.querySelectorAll('.rv').forEach((el, i) => setTimeout(() => el.classList.add('in'), 80 + i * 70));
});

document.getElementById('forgot-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('forgot-btn');
  const errEl = document.getElementById('forgot-error');
  const sucEl = document.getElementById('forgot-success');
  const email = document.getElementById('forgot-email').value.trim();
  errEl.classList.add('hidden'); sucEl.classList.add('hidden');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined text-[18px] animate-spin">refresh</span> Sending...';
  try {
    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/update-password.html' });
    if (error) throw error;
    sucEl.textContent = 'Reset link sent! Check your email inbox (and spam folder).';
    sucEl.classList.remove('hidden');
    btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">check</span> Link Sent';
  } catch(err) {
    errEl.textContent = err.message || 'Something went wrong. Please try again.';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '<span>Send Reset Link</span><span class="material-symbols-outlined text-[18px]">send</span>';
  }
});
</script>
</body>
</html>
