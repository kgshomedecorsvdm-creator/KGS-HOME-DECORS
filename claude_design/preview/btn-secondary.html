<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Secondary button</title>
<link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
  .btn-card {
    background: linear-gradient(180deg, #FDF9F3 0%, #F3EDE4 100%);
    padding: 26px 30px;
    display: block;
  }
  .head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding-bottom: 12px;
    border-bottom: 1px solid rgba(197,168,128,0.30);
  }
  .head .cap {
    font-family: var(--font-sans); font-size: 10px; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase; color: var(--label);
  }
  .head em { font-family: var(--font-serif); font-style: italic; font-size: 12.5px; color: var(--muted); }

  .row { display: grid; grid-template-columns: 96px 1fr; gap: 22px; align-items: center; padding: 12px 0; }
  .row + .row { border-top: 1px dashed rgba(197,168,128,0.25); }
  .state {
    font-family: var(--font-sans); font-size: 9.5px; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase; color: var(--label);
  }
  .stage { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }

  /* On-dark backdrop */
  .stage--dark {
    background: linear-gradient(160deg, #1A1A1A, #100f0e);
    border: 1px solid rgba(197,168,128,0.16);
    padding: 14px 18px;
    border-radius: 6px;
    display: flex; gap: 12px;
  }

  /* ====== Premium secondary — ghost with slow ink-fill ====== */
  .btn {
    position: relative;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 15px 28px;
    background: transparent;
    color: #1A1A1A;
    font-family: 'Jost', sans-serif;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase;
    border: 1px solid rgba(26,26,26,0.22);
    cursor: pointer;
    overflow: hidden;
    transition: color 500ms cubic-bezier(0.25, 1, 0.5, 1),
                border-color 500ms cubic-bezier(0.25, 1, 0.5, 1);
  }

  /* Ink fill that wipes in from bottom on hover */
  .btn::before {
    content: '';
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 0;
    background: #1A1A1A;
    transition: height 500ms cubic-bezier(0.25, 1, 0.5, 1);
    z-index: 0;
  }
  .btn .label,
  .btn .arrow { position: relative; z-index: 1; transition: color 500ms cubic-bezier(0.25, 1, 0.5, 1); }
  .btn .arrow .material-symbols-outlined { font-size: 14px; }

  .btn-hover {
    color: #fff;
    border-color: #1A1A1A;
  }
  .btn-hover::before { height: 100%; }

  .btn-press { transform: scale(0.97); transition: transform 80ms; }

  .btn-disabled {
    color: rgba(26,26,26,0.32);
    border-color: rgba(26,26,26,0.10);
    cursor: not-allowed;
  }

  /* Gold underline-variant — for "VIEW ALL" inline link buttons */
  .btn-link {
    padding: 0 0 2px;
    border: none;
    border-bottom: 1px solid rgba(26,26,26,0.22);
    color: var(--ink);
    background: transparent;
    transition: border-color 500ms cubic-bezier(0.25, 1, 0.5, 1),
                color 500ms cubic-bezier(0.25, 1, 0.5, 1);
  }
  .btn-link::before { display: none; }
  .btn-link.btn-hover { border-bottom-color: var(--gold); color: var(--gold-dark, #8E7449); }

  /* Light variant on ink panel */
  .btn-light {
    color: #fff;
    border-color: rgba(255,255,255,0.30);
  }
  .btn-light::before { background: #fff; }
  .btn-light.btn-hover {
    color: #1A1A1A;
    border-color: #fff;
  }

  .spec {
    display: flex; gap: 18px; flex-wrap: wrap;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid rgba(197,168,128,0.30);
    font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted);
  }
  .spec b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
<div class="card btn-card">
  <div class="head">
    <span class="cap">Secondary · Ghost</span>
    <em>slow ink wipe · quiet companion to terracotta</em>
  </div>

  <div class="row">
    <span class="state">Default</span>
    <div class="stage">
      <button class="btn"><span class="label">Visit Showroom</span><span class="arrow"><span class="material-symbols-outlined">arrow_forward</span></span></button>
      <button class="btn btn-link"><span class="label">View All</span><span class="arrow"><span class="material-symbols-outlined">arrow_forward</span></span></button>
    </div>
  </div>
  <div class="row">
    <span class="state">Hover</span>
    <div class="stage">
      <button class="btn btn-hover"><span class="label">Visit Showroom</span><span class="arrow"><span class="material-symbols-outlined">arrow_forward</span></span></button>
      <button class="btn btn-link btn-hover"><span class="label">View All</span><span class="arrow"><span class="material-symbols-outlined">arrow_forward</span></span></button>
    </div>
  </div>
  <div class="row">
    <span class="state">Pressed</span>
    <div class="stage">
      <button class="btn btn-press"><span class="label">Visit Showroom</span></button>
    </div>
  </div>
  <div class="row">
    <span class="state">On Ink</span>
    <div class="stage" style="gap:0">
      <div class="stage--dark">
        <button class="btn btn-light"><span class="label">WhatsApp Us First</span></button>
        <button class="btn btn-light btn-hover"><span class="label">WhatsApp Us First</span></button>
      </div>
    </div>
  </div>
  <div class="row">
    <span class="state">Disabled</span>
    <div class="stage">
      <button class="btn btn-disabled"><span class="label">Notify Me</span></button>
    </div>
  </div>

  <div class="spec">
    <span><b>Default</b> border rgba(26,26,26,.22)</span>
    <span><b>Hover</b> ink fills bottom-up · text flips white</span>
    <span><b>Type</b> Jost 600 · 10.5 · .22em</span>
    <span><b>Padding</b> 15 · 28</span>
    <span><b>Ease</b> --ease-cta · 500ms</span>
  </div>
</div>
</body>
</html>
