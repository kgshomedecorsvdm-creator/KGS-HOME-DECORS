<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Icon buttons + badges</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card card--surface">
<div class="row" style="gap:22px;align-items:center">
  <button style="width:36px;height:36px;background:#fff;border:1px solid rgba(0,0,0,.05);border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#5E5B59;box-shadow:0 4px 12px rgba(0,0,0,.04)">♡</button>
  <button style="width:36px;height:36px;background:#fff;border:1px solid rgba(0,0,0,.05);border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#C97840;box-shadow:0 8px 16px rgba(0,0,0,.08);transform:scale(1.1)">♥</button>
  <div style="display:flex;gap:10px">
    <span style="background:#1A1A1A;color:#fff;font-family:Jost;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 8px">Best Seller</span>
    <span style="background:#C97840;color:#fff;font-family:Jost;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 8px">New</span>
    <span style="background:#C5A880;color:#fff;font-family:Jost;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 8px">Staff Pick</span>
    <span style="background:rgba(197,168,128,.15);color:#7A5C1E;font-family:Jost;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 8px">-16%</span>
  </div>
  <div class="col grow"><div class="cap">Heart · Badges</div></div>
</div></div></body></html>
