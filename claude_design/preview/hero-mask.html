<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hero</title>
<link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
  body { background: #FDF9F3; }
  .card { padding: 0; align-items: stretch; }

  .hero {
    width: 100%;
    background: linear-gradient(110deg, #EFE6D7 0%, #E6DBC4 100%);
    padding: 30px 36px;
    display: grid;
    grid-template-columns: 30px 1fr 1.15fr;
    gap: 22px;
    align-items: center;
    position: relative;
    min-height: 290px;
  }

  /* Slide indicator */
  .slides {
    display: flex; flex-direction: column;
    align-items: center;
    gap: 4px;
    font-family: var(--font-sans);
    font-size: 9.5px;
    color: var(--muted);
    letter-spacing: .04em;
    align-self: center;
  }
  .slides .n {
    padding: 1px 4px;
    cursor: pointer;
    transition: color 250ms ease;
  }
  .slides .n.active { color: var(--ink); font-weight: 600; }
  .slides .n:hover { color: var(--ink); }
  .slides .rule { width: 1px; height: 12px; background: rgba(26,26,26,0.20); }

  /* Copy column */
  .copy { padding: 4px 0; }

  h1 {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 34px;
    line-height: 1.04;
    letter-spacing: -0.018em;
    color: var(--ink);
    margin: 0 0 14px;
    transition: opacity 400ms ease;
  }

  .sub {
    font-family: var(--font-sans);
    font-size: 12px;
    color: rgba(26,26,26,0.55);
    margin-bottom: 24px;
    letter-spacing: 0;
    transition: opacity 400ms ease;
  }

  .ctas { display: flex; gap: 12px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-sans);
    font-size: 9.5px; font-weight: 600;
    letter-spacing: .18em; text-transform: uppercase;
    padding: 12px 22px;
    cursor: pointer;
  }
  .btn-dark { background: #1A1A1A; color: #fff; border: 1px solid #1A1A1A; }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid rgba(26,26,26,0.30); }

  .arrows {
    display: flex; gap: 8px;
    margin-top: 28px;
  }
  .arrow {
    width: 28px; height: 28px;
    border-radius: 9999px;
    background: transparent;
    border: 1px solid rgba(26,26,26,0.22);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
    cursor: pointer;
    transition: all 200ms ease;
  }
  .arrow:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
  .arrow .material-symbols-outlined { font-size: 13px; font-variation-settings: 'wght' 300; }

  /* Photo */
  .scene {
    position: relative;
    height: 100%;
    min-height: 250px;
    overflow: hidden;
    border-radius: 3px;
  }
  .scene img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 500ms ease;
  }
</style>
</head>
<body>
<div class="card">
  <div class="hero">

    <div class="slides" id="slides">
      <span class="n active" data-i="0">01</span>
      <span class="rule"></span>
      <span class="n" data-i="1">02</span>
      <span class="rule"></span>
      <span class="n" data-i="2">03</span>
    </div>

    <div class="copy">
      <h1 id="head">Luxury Home Decor<br>Crafted For<br>Modern Spaces</h1>
      <p class="sub" id="sub">Minimal. Elegant. Timeless.</p>
      <div class="ctas">
        <button class="btn btn-dark">Shop Collection</button>
        <button class="btn btn-ghost">Explore Best Sellers</button>
      </div>
      <div class="arrows">
        <button class="arrow" id="prev"><span class="material-symbols-outlined">chevron_left</span></button>
        <button class="arrow" id="next"><span class="material-symbols-outlined">chevron_right</span></button>
      </div>
    </div>

    <div class="scene">
      <img id="hero-img" src="../assets/lifestyle/showroom_interior.webp" alt="KGS Showroom Interior">
    </div>

  </div>
</div>

<script>
const SLIDES = [
  {
    img: '../assets/lifestyle/showroom_interior.webp',
    alt: 'KGS Showroom Interior',
    head: 'Luxury Home Decor<br>Crafted For<br>Modern Spaces',
    sub: 'Minimal. Elegant. Timeless.',
  },
  {
    img: '../assets/banners/storefront_hero.webp',
    alt: 'KGS Storefront at Twilight',
    head: 'Visit Our Showroom<br>On Junction Road,<br>Virudhachalam',
    sub: 'Open daily · 10 AM — 10 PM.',
  },
  {
    img: '../assets/lifestyle/room_zen.webp',
    alt: 'Heritage Brass Fountain Interior',
    head: 'Heritage Décor For<br>The Homes That<br>Hold Memory',
    sub: 'Brass · stone · slow craft.',
  },
];

let i = 0;
let auto = null;

const $ = (id) => document.getElementById(id);
const img = $('hero-img');
const head = $('head');
const sub = $('sub');

function setSlide(n) {
  i = (n + SLIDES.length) % SLIDES.length;
  const s = SLIDES[i];

  // Fade out → swap → fade in
  img.style.opacity = '0';
  head.style.opacity = '0';
  sub.style.opacity = '0';

  setTimeout(() => {
    img.src = s.img;
    img.alt = s.alt;
    head.innerHTML = s.head;
    sub.textContent = s.sub;
    img.style.opacity = '1';
    head.style.opacity = '1';
    sub.style.opacity = '1';
  }, 250);

  document.querySelectorAll('#slides .n').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
}

$('next').addEventListener('click', () => { setSlide(i + 1); startAuto(); });
$('prev').addEventListener('click', () => { setSlide(i - 1); startAuto(); });
document.querySelectorAll('#slides .n').forEach(el => {
  el.addEventListener('click', () => { setSlide(parseInt(el.dataset.i, 10)); startAuto(); });
});

function startAuto() {
  if (auto) clearInterval(auto);
  auto = setInterval(() => setSlide(i + 1), 5500);
}
startAuto();

document.querySelector('.hero').addEventListener('mouseenter', () => { if (auto) { clearInterval(auto); auto = null; } });
document.querySelector('.hero').addEventListener('mouseleave', startAuto);
</script>
</body>
</html>
