<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Borders</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card card--base">
<div class="row" style="gap:24px;width:100%">

  <div class="swatch" style="flex:1"><div class="chip" style="background:var(--surface);border:1px solid rgba(26,26,26,0.30)"></div><div class="name">border-strong</div><div class="hex">rgba(26,26,26,.30)</div></div>
