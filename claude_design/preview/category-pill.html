<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Category pill</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card card--surface">
<div class="row" style="gap:24px">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div style="width:100px;height:100px;border-radius:9999px;overflow:hidden;border:2px solid transparent">
      <img src="../assets/categories/cat_sofas.webp" style="width:100%;height:100%;object-fit:cover">
    </div>
    <div style="font-family:Jost,sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#1A1A1A">Furniture</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div style="width:100px;height:100px;border-radius:9999px;overflow:hidden;border:2px solid #C5A880;transform:scale(1.05);box-shadow:0 10px 30px -5px rgba(197,168,128,.3)">
      <img src="../assets/categories/cat_lighting.webp" style="width:100%;height:100%;object-fit:cover">
    </div>
    <div style="font-family:Jost,sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#C97840">Lighting</div>
  </div>
  <div class="col grow" style="gap:6px">
    <div class="cap">Category pill · idle · hover</div>
    <div style="font-size:12px;color:var(--muted);line-height:1.7">Round photo thumb. Hover: 2px gold border + scale 1.05 + soft warm shadow. Label color shifts to terracotta.</div>
  </div>
</div></div></body></html>
