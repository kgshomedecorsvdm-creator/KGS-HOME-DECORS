<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Shadow system</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card card--base">
<div class="row" style="gap:22px;width:100%;justify-content:space-around">
  <div class="col" style="align-items:center;gap:10px"><div style="width:72px;height:72px;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:none"></div><div class="cap">none</div></div>
  <div class="col" style="align-items:center;gap:10px"><div style="width:72px;height:72px;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.04)"></div><div class="cap">xs</div></div>
  <div class="col" style="align-items:center;gap:10px"><div style="width:72px;height:72px;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 10px 30px -5px rgba(0,0,0,.03)"></div><div class="cap">sm idle</div></div>
  <div class="col" style="align-items:center;gap:10px"><div style="width:72px;height:72px;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 12px 40px -10px rgba(0,0,0,.08)"></div><div class="cap">lg hover</div></div>
  <div class="col" style="align-items:center;gap:10px"><div style="width:72px;height:72px;background:var(--warm);border-radius:6px;box-shadow:0 4px 14px rgba(201,120,64,.15)"></div><div class="cap">cta</div></div>
  <div class="col" style="align-items:center;gap:10px"><div style="width:72px;height:72px;background:var(--warm);border-radius:6px;box-shadow:0 20px 40px -10px rgba(201,120,64,.45)"></div><div class="cap">cta hover</div></div>
</div></div></body></html>
