<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Display serif</title>
<link rel="stylesheet" href="_card.css">
<style>
  .display-card {
    background:
      radial-gradient(120% 80% at 80% 20%, rgba(197,168,128,0.10), transparent 60%),
      linear-gradient(180deg, #FDF9F3 0%, #F3EDE4 100%);
    padding: 28px 32px;
    display: flex; align-items: stretch; gap: 28px;
  }

  .display-card .left { flex: 1; min-width: 0; }
  .display-card .right {
    width: 200px;
    padding-left: 22px;
    border-left: 1px solid rgba(197,168,128,0.35);
    display: flex; flex-direction: column; justify-content: space-between;
    flex-shrink: 0;
  }

  .stack {
    display: flex; align-items: baseline; gap: 14px;
    border-bottom: 1px solid rgba(197,168,128,0.20);
    padding: 6px 0;
  }
  .stack:last-child { border-bottom: none; }
  .stack-num {
    font-family: ui-monospace, monospace;
    font-size: 9.5px;
    color: var(--label);
    width: 26px;
    flex-shrink: 0;
  }
  .stack-spec {
    font-family: var(--font-serif);
    color: var(--ink);
    line-height: 1;
  }

  .head-display {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 56px;
    line-height: 1.02;
    color: var(--ink);
    letter-spacing: -0.012em;
    margin: 0 0 6px;
  }
  .head-display em {
    font-style: italic;
    font-weight: 400;
    color: var(--gold);
  }

  .micro {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .02em;
  }
  .pill {
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--label);
    background: rgba(197,168,128,0.16);
    border: 1px solid rgba(197,168,128,0.40);
    padding: 3px 9px;
    border-radius: 9999px;
    display: inline-block;
  }
  .micro-label {
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="card display-card">
  <div class="left">
    <h1 class="head-display">Design Your <em>Space</em>,<br>Define Your Comfort.</h1>
    <div style="display:flex;align-items:center;gap:10px;margin-top:14px">
      <span class="pill">Crimson Pro</span>
      <span class="micro">Display · Headings · Prices · Italic Quotes</span>
    </div>
  </div>

  <div class="right">
    <div>
      <div class="micro-label" style="margin-bottom:10px">Weights</div>
      <div class="stack"><span class="stack-num">300</span><span class="stack-spec" style="font-weight:300;font-size:20px">Aa</span><span class="micro">Light</span></div>
      <div class="stack"><span class="stack-num">400</span><span class="stack-spec" style="font-weight:400;font-size:22px">Aa</span><span class="micro">Regular</span></div>
      <div class="stack"><span class="stack-num">500</span><span class="stack-spec" style="font-weight:500;font-size:24px">Aa</span><span class="micro" style="color:var(--label);font-weight:600">Workhorse</span></div>
      <div class="stack"><span class="stack-num">400i</span><span class="stack-spec" style="font-weight:400;font-style:italic;font-size:22px;color:var(--gold)">Aa</span><span class="micro">Italic</span></div>
    </div>

    <div style="margin-top:14px;font-family:var(--font-serif);font-style:italic;font-size:11.5px;line-height:1.55;color:var(--muted)">
      Set medium at all display sizes; italic accents only on emphasis &amp; quotes.
    </div>
  </div>
</div>
</body>
</html>
