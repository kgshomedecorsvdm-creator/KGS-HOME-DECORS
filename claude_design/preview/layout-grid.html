<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Layout grid</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card card--base">
<div class="col grow" style="gap:10px">
  <div class="cap">Page · 90rem max · 48 / 20px gutter</div>
  <div style="position:relative;width:100%;height:80px;background:var(--surface);border:1px dashed var(--border);display:flex">
    <div style="width:48px;background:repeating-linear-gradient(135deg,rgba(201,120,64,.1),rgba(201,120,64,.1) 4px,transparent 4px,transparent 8px);"></div>
    <div style="flex:1;display:grid;grid-template-columns:repeat(12,1fr);gap:24px;padding:8px 0">
      <div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div><div style="background:rgba(26,26,26,.04);border:1px solid rgba(26,26,26,.06)"></div>
    </div>
    <div style="width:48px;background:repeating-linear-gradient(135deg,rgba(201,120,64,.1),rgba(201,120,64,.1) 4px,transparent 4px,transparent 8px);"></div>
  </div>
  <div class="spec-row"><span><b>max-w</b> 1440px</span><span><b>gutter</b> 48px</span><span><b>cols</b> 12 · 24px gap</span><span><b>nav-h</b> 96 / 80 px</span></div>
</div></div></body></html>
