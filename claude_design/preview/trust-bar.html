<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Trust badges</title>
<link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
  body { background: #FAF7F0; }
  .card { padding: 0; align-items: stretch; }

  .strip {
    width: 100%;
    background: #FFFFFF;
    padding: 22px 32px;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 22px;
    align-items: center;
  }
  .item {
    display: flex; align-items: center; gap: 14px;
    justify-content: flex-start;
  }
  .icon {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(184, 150, 87, 0.12);
    display: flex; align-items: center; justify-content: center;
    color: #6B4F1F;
  }
  .icon .material-symbols-outlined {
    font-size: 19px;
    font-variation-settings: 'wght' 350;
  }
  .text { line-height: 1.25; }
  .title {
    font-family: 'Jost', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    color: #1A1A1A;
    letter-spacing: 0;
  }
  .sub {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: #8A857F;
    margin-top: 2px;
    letter-spacing: 0;
  }
  .hairline {
    height: 1px;
    background: rgba(26,26,26,0.06);
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="strip">
    <div class="row">
      <div class="item">
        <div class="icon"><span class="material-symbols-outlined">lock</span></div>
        <div class="text">
          <div class="title">Secure Payments</div>
          <div class="sub">100% Safe &amp; Secure</div>
        </div>
      </div>
      <div class="item">
        <div class="icon"><span class="material-symbols-outlined">local_shipping</span></div>
        <div class="text">
          <div class="title">Fast Delivery</div>
          <div class="sub">Pan India Delivery</div>
        </div>
      </div>
      <div class="item">
        <div class="icon"><span class="material-symbols-outlined">verified</span></div>
        <div class="text">
          <div class="title">Premium Quality</div>
          <div class="sub">Best In Class</div>
        </div>
      </div>
      <div class="item">
        <div class="icon"><span class="material-symbols-outlined">replay</span></div>
        <div class="text">
          <div class="title">Easy Returns</div>
          <div class="sub">Hassle Free Returns</div>
        </div>
      </div>
      <div class="item">
        <div class="icon"><span class="material-symbols-outlined">support_agent</span></div>
        <div class="text">
          <div class="title">24/7 Support</div>
          <div class="sub">We Are Here</div>
        </div>
      </div>
    </div>
    <div class="hairline"></div>
  </div>
</div>
</body>
</html>
