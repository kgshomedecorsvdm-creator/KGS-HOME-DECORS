<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card card--base">
<div class="row" style="gap:18px;width:100%;justify-content:space-around">
  <div class="col" style="align-items:center;gap:8px"><div style="width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:0"></div><div class="mono">0</div><div class="cap">sharp</div></div>
  <div class="col" style="align-items:center;gap:8px"><div style="width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:4px"></div><div class="mono">4</div><div class="cap">chip</div></div>
  <div class="col" style="align-items:center;gap:8px"><div style="width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:6px"></div><div class="mono">6</div><div class="cap">card</div></div>
  <div class="col" style="align-items:center;gap:8px"><div style="width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:12px"></div><div class="mono">12</div><div class="cap">media</div></div>
  <div class="col" style="align-items:center;gap:8px"><div style="width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:9999px"></div><div class="mono">∞</div><div class="cap">pill</div></div>
  <div class="col" style="align-items:center;gap:8px"><div style="width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-top-left-radius:40px;border-bottom-right-radius:10px"></div><div class="mono">hero</div><div class="cap">asym mask</div></div>
</div></div></body></html>
