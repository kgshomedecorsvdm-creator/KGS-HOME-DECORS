<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Price treatment</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card card--surface">
<div class="row" style="gap:28px">
  <div class="col">
    <div class="cap">Live</div>
    <div style="display:flex;align-items:baseline;gap:10px">
      <div style="font-family:var(--font-serif);font-weight:500;font-size:32px;color:var(--ink)">₹18,500</div>
      <div style="font-size:14px;color:var(--muted);text-decoration:line-through">₹22,000</div>
      <div style="font-size:11px;font-weight:600;color:var(--warm);background:rgba(201,120,64,0.10);padding:3px 8px;text-transform:uppercase;letter-spacing:.1em">16% off</div>
    </div>
  </div>
  <div class="col">
    <div class="cap">Single price</div>
    <div style="font-family:var(--font-serif);font-weight:500;font-size:28px;color:var(--ink)">₹2,850</div>
  </div>
</div></div></body></html>
