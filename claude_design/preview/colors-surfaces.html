<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Surfaces</title>
<link rel="stylesheet" href="_card.css">
<style>
  .surf-card {
    background: linear-gradient(180deg, var(--tint) 0%, #ECE3D6 100%);
    padding: 26px 30px;
  }

  .stack { display: flex; gap: 18px; width: 100%; align-items: stretch; }

  .surf {
    position: relative;
    flex: 1;
    border-radius: 8px;
    padding: 18px 16px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 150px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 12px 28px -16px rgba(74, 56, 30, 0.35);
    border: 1px solid rgba(26,26,26,0.05);
    overflow: hidden;
  }
  /* Hairline accent — a thin gold rule like a fine-paper sampler */
  .surf::before {
    content: '';
    position: absolute;
    left: 16px; right: 16px; top: 14px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(197,168,128,0.7), transparent);
  }

  .surf__name {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 17px;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .surf__role {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--label);
    margin-top: 2px;
  }
  .surf__hex {
    font-family: ui-monospace, monospace;
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: .04em;
  }

  /* Specific surfaces */
  .surf--base    { background: #FAF8F4; }
  .surf--tint    { background: #F3EDE4; }
  .surf--surface { background: #FDF9F3; }
  .surf--white   { background: #FFFFFF; }
  .surf--ink     {
    background: radial-gradient(120% 100% at 30% 20%, #2a2624, #1A1A1A 70%);
    border-color: rgba(0,0,0,0.5);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.06) inset,
      0 12px 28px -14px rgba(0,0,0,0.5);
  }
  .surf--ink::before { background: linear-gradient(90deg, transparent, rgba(197,168,128,0.55), transparent); }
  .surf--ink .surf__name { color: #fff; }
  .surf--ink .surf__role { color: #C5A880; }
  .surf--ink .surf__hex  { color: rgba(255,255,255,0.55); }
</style>
</head>
<body>
<div class="card surf-card">
  <div class="stack">
    <div class="surf surf--base">
      <div>
        <div class="surf__role">Page</div>
        <div class="surf__name">Base</div>
      </div>
      <div class="surf__hex">#FAF8F4</div>
    </div>
    <div class="surf surf--tint">
      <div>
        <div class="surf__role">Band</div>
        <div class="surf__name">Tint</div>
      </div>
      <div class="surf__hex">#F3EDE4</div>
    </div>
    <div class="surf surf--surface">
      <div>
        <div class="surf__role">Card · Nav</div>
        <div class="surf__name">Surface</div>
      </div>
      <div class="surf__hex">#FDF9F3</div>
    </div>
    <div class="surf surf--white">
      <div>
        <div class="surf__role">Product BG</div>
        <div class="surf__name">White</div>
      </div>
      <div class="surf__hex">#FFFFFF</div>
    </div>
    <div class="surf surf--ink">
      <div>
        <div class="surf__role">Footer · Hero</div>
        <div class="surf__name">Ink</div>
      </div>
      <div class="surf__hex">#1A1A1A</div>
    </div>
  </div>
</div>
</body>
</html>
